<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO QR</title><style>body{margin:0;font-family:system-ui;background:#071124;color:#fff}header{padding:18px 22px;background:#0e1b3f;position:sticky;top:0}main{padding:18px;max-width:1180px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.card{background:#101b3d;border:1px solid #263b78;border-radius:16px;padding:14px;margin:10px 0}input,select,textarea,button{width:100%;box-sizing:border-box;margin:6px 0;padding:11px;border-radius:10px;border:1px solid #2f4484;background:#09142d;color:#fff}button{background:#17b7ff;color:#041023;font-weight:800;cursor:pointer}.muted{color:#aab8e8}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#20396d;margin:2px}.bad{background:#5b1b2b}.good{background:#124d37}.row{display:flex;gap:8px;flex-wrap:wrap}.row>*{flex:1;min-width:160px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #263b78;padding:8px;text-align:left}a{color:#7df9ff}</style></head><body><header><h2>🔳 QR Management · Sprint-7N</h2><div class=muted>Area/Stand/Driver/General QR source tracking.</div></header><main><div class=card><input id=token placeholder="Admin token"><button onclick="saveToken()">Save Token</button></div><div class=card><h3>Create QR</h3><div class=row><select id=type><option>GENERAL</option><option>AREA</option><option>STAND</option><option>DRIVER</option></select><input id=target placeholder="target_id blank for GENERAL"><input id=name placeholder="QR name"></div><button onclick="createQR()">Create QR</button></div><div class=card><h3>QR Assets</h3><div id=qrs></div></div></main><script>
token.value=localStorage.nexo_admin_token||'';function saveToken(){localStorage.nexo_admin_token=token.value.trim();loadQR();}function hdr(){return {'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.nexo_admin_token||token.value.trim())}}async function j(u,o={}){const r=await fetch(u,{...o,headers:{...hdr(),...(o.headers||{})}});const x=await r.json().catch(()=>({detail:'Bad JSON'}));if(!r.ok)throw new Error(x.detail||r.status);return x;}
async function createQR(){try{await j('/api/admin/qr-codes',{method:'POST',body:JSON.stringify({target_type:type.value,target_id:target.value,name:name.value})});target.value='';name.value='';loadQR();}catch(e){alert(e.message)}}
async function tog(id){try{await j('/api/admin/qr-codes/'+id+'/toggle',{method:'POST'});loadQR();}catch(e){alert(e.message)}}
async function loadQR(){try{let x=await j('/api/admin/qr-codes'); qrs.innerHTML='<table><tr><th>Name</th><th>Type</th><th>URL</th><th>Scan</th><th>Action</th></tr>'+x.qr_assets.map(q=>`<tr><td><b>${q.name}</b><br>${q.code}</td><td>${q.target_type}</td><td><a target=_blank href="${q.booking_url}">${q.booking_url}</a><br><span class=muted>Short: /q/${q.code}</span></td><td>${q.scan_count||0}</td><td><button onclick="tog('${q.id}')">${q.enabled?'Disable':'Enable'}</button></td></tr>`).join('')+'</table>';}catch(e){qrs.innerHTML='<div class=card>'+e.message+'</div>';}}
if(token.value) loadQR();
</script></body></html>
