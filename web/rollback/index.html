<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride · Rollback Pack</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#07111f;color:#eef6ff}.wrap{max-width:1100px;margin:auto;padding:22px}.hero{background:linear-gradient(135deg,#0f2350,#102b22);border:1px solid #29476d;border-radius:22px;padding:22px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:#0e1b32;border:1px solid #273b62;border-radius:18px;padding:16px}.ok{color:#52ffa8}.bad{color:#ff7d7d}.warn{color:#ffd76a}.muted{color:#a9bad8}.btn{display:inline-block;padding:11px 14px;margin:4px;border-radius:12px;background:#22d3ee;color:#06111f;text-decoration:none;font-weight:800}code{background:#020817;padding:3px 6px;border-radius:8px}button{padding:10px 12px;border:0;border-radius:12px;background:#22d3ee;font-weight:800}input,textarea,select{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #334b73;background:#081629;color:#fff;padding:10px;margin:4px 0}</style></head><body><div class="wrap"><div class="hero"><h1>Rollback + Emergency Pack</h1><p class="muted">Deploy সমস্যা হলে booking/dispatch/payment pause করে previous stable code restore করার guide।</p><a class="btn" href="/maintenance/">Open Maintenance Mode</a><a class="btn" href="/security-deploy/">Security Deploy</a></div><div id="steps" class="grid"></div></div><script>
async function load(){const g=await fetch('/api/admin/deploy-rollback-guide').then(r=>r.ok?r.json():fetch('/api/platform/security-deploy-readiness').then(x=>x.json())); const guide=g.rollback_steps?g:g.guide||{}; const steps=guide.rollback_steps||['Login required for full rollback guide.']; document.getElementById('steps').innerHTML=steps.map((s,i)=>`<div class="card"><h3>Step ${i+1}</h3><p>${s}</p></div>`).join('')+'<div class="card"><h3>Emergency Switches</h3><p>Public Booking Pause · Driver Dispatch Pause · Payment Pause · Admin Only Mode</p></div>'}
load();</script></body></html>
