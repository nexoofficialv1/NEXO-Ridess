<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Driver Lite</title>
<style>body{margin:0;font-family:system-ui;background:#061026;color:#fff}.wrap{max-width:760px;margin:auto;padding:16px}.card{background:#101b3a;border:1px solid #283b77;border-radius:20px;padding:16px;margin:12px 0}input{width:100%;box-sizing:border-box;padding:13px;border-radius:13px;border:1px solid #36518f;background:#08142d;color:#fff;margin:6px 0 10px}button,a.btn{display:inline-block;text-decoration:none;border:0;border-radius:13px;padding:12px 14px;margin:5px;background:#34e8ff;color:#00111a;font-weight:900}.danger{background:#ff7676}.dark{background:#253864;color:#fff!important}.ok{color:#66ffad}.bad{color:#ff8a8a}.muted{color:#abb9e9}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#08142d;border-radius:14px;padding:12px}.small{font-size:13px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.check{width:auto!important;margin-right:7px}</style></head><body><div class="wrap"><h1>🚖 NEXO Driver Dashboard</h1>
<div class="card" id="login"><b>Driver Login</b><p class="muted">একবার OTP login করলে trusted device হিসেবে থাকবে। প্রতিদিন login করতে হবে না। New phone হলে আবার OTP লাগবে।</p><label>Mobile</label><input id="mobile" placeholder="Driver mobile number"><button onclick="requestOtp()">Request OTP</button><label>OTP</label><input id="otp" placeholder="OTP"><label><input class="check" id="remember" type="checkbox" checked> এই device trusted রাখুন</label><button onclick="loginOtp()">Login with OTP</button><hr style="border-color:#283b77"><p class="muted small">Existing token থাকলে paste করুন:</p><input id="token" placeholder="Bearer token"><button onclick="saveToken()">Use Token</button><button class="dark" onclick="logout(false)">Logout</button><button class="danger" onclick="logout(true)">Logout + Clear Device</button><p id="session" class="muted small"></p></div>
<div class="card"><button onclick="goOnline(true)">Go Online</button><button class="dark" onclick="goOnline(false)">Go Offline</button><button class="dark" onclick="loadDash()">Refresh</button><button class="dark" onclick="loadDevices()">My Devices</button><p id="hb" class="muted small">GPS heartbeat idle.</p></div>
<div id="dash" class="card">Loading...</div><div id="devices"></div><div id="requests"></div><div id="active"></div></div>
<script>let token=localStorage.getItem('nexo_driver_token')||''; let refreshToken=(window.NexoRideNative?.getDriverRefreshToken?.()||localStorage.getItem('nexo_driver_refresh_token')||''); let deviceId=(window.NexoRideNative?.getDeviceId?.()||localStorage.getItem('nexo_driver_device_id')||''); if(!deviceId){deviceId='web_'+crypto.getRandomValues(new Uint32Array(4)).join('_'); localStorage.setItem('nexo_driver_device_id',deviceId)}; document.getElementById('token').value=token; const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); const enc=encodeURIComponent;
function sessionText(){const exp=localStorage.getItem('nexo_driver_refresh_expires')||''; $('session').textContent=refreshToken?'Trusted device active. Refresh expiry: '+(exp||'unknown'):'No trusted refresh session saved.'} sessionText();
function storeAuth(j){if(j.token){token=j.token; localStorage.setItem('nexo_driver_token',token); $('token').value=token;} if(j.refresh_token){refreshToken=j.refresh_token; localStorage.setItem('nexo_driver_refresh_token',refreshToken); try{window.NexoRideNative?.storeDriverRefreshToken?.(refreshToken)}catch(e){} localStorage.setItem('nexo_driver_refresh_expires',j.refresh_expires_at||'');} if(j.trusted_device?.device_id){deviceId=j.trusted_device.device_id; localStorage.setItem('nexo_driver_device_id',deviceId)} sessionText();}
function saveToken(){token=$('token').value.trim().replace(/^Bearer\s+/i,''); localStorage.setItem('nexo_driver_token',token); loadDash()}
/* SPRINT7H_NATIVE_DRIVER_LITE */
async function logout(clearDevice){try{if(clearDevice){try{window.NexoRideNative?.clearDriverRefreshToken?.()}catch(e){}} if(token) await api('/api/auth/logout',{method:'POST',body:JSON.stringify({clear_device:!!clearDevice})},false);}catch(e){} token=''; refreshToken=''; localStorage.removeItem('nexo_driver_token'); localStorage.removeItem('nexo_driver_refresh_token'); localStorage.removeItem('nexo_driver_refresh_expires'); $('token').value=''; try{if(clearDevice)window.NexoRideNative?.clearDriverRefreshToken?.()}catch(e){} $('dash').textContent='Logged out'; $('requests').textContent=''; $('active').textContent=''; $('devices').textContent=''; sessionText();}
async function requestOtp(){try{const mobile=$('mobile').value.trim(); if(!mobile) return alert('Mobile number দিন'); const j=await api('/api/auth/request-otp',{method:'POST',body:JSON.stringify({mobile,purpose:'DRIVER_LOGIN'})},false); alert(j.message||'OTP sent');}catch(e){alert(e.message)}}
async function loginOtp(){try{const body={mobile:$('mobile').value.trim(), otp:$('otp').value.trim(), role:'DRIVER', remember_device:$('remember').checked, consent:true, device_id:deviceId, device_name:navigator.platform||'Driver Phone Browser', platform:(window.NexoRideNative?'ANDROID_APK':'WEB')}; const j=await api('/api/auth/login-otp',{method:'POST',body:JSON.stringify(body)},false); storeAuth(j); loadDash();}catch(e){alert(e.message)}}
async function refreshSession(){if(!refreshToken)return false; try{const r=await fetch('/api/auth/refresh-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:refreshToken,device_id:deviceId,platform:(window.NexoRideNative?'ANDROID_APK':'WEB')})}); const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.detail||'Refresh failed'); storeAuth(j); return true;}catch(e){$('session').textContent='Session refresh failed: '+e.message; return false;}}
async function api(path,opts={},tryRefresh=true){opts.headers={...(opts.headers||{}),'Content-Type':'application/json'}; if(token) opts.headers.Authorization='Bearer '+token; let r=await fetch(path,opts); let j=await r.json().catch(()=>({detail:'Invalid response'})); if(r.status===401 && tryRefresh && await refreshSession()){opts.headers.Authorization='Bearer '+token; r=await fetch(path,opts); j=await r.json().catch(()=>({detail:'Invalid response'}));} if(!r.ok) throw new Error(j.detail||'Request failed'); return j}
function gps(){return new Promise((res)=>{if(!navigator.geolocation)return res({}); navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy}),()=>res({}),{enableHighAccuracy:true,timeout:8000})})}
async function heartbeat(){if(!token)return; try{const g=await gps(); if(!g.lat)return; await api('/api/driver/location-update',{method:'POST',body:JSON.stringify({...g,source:'DRIVER_LITE_HEARTBEAT'})}); $('hb').textContent='GPS heartbeat updated '+new Date().toLocaleTimeString();}catch(e){$('hb').textContent='GPS heartbeat: '+e.message}}
async function goOnline(on){try{const g=await gps(); const path=on?'/api/driver/go-online':'/api/driver/go-offline'; await api(path,{method:'POST',body:JSON.stringify(g)}); if(on) heartbeat(); loadDash()}catch(e){$('dash').innerHTML='<span class="bad">'+esc(e.message)+'</span>'}}
function mapLink(r,kind){let q=''; if(kind==='pickup') q=r.pickup_lat&&r.pickup_lng?`${r.pickup_lat},${r.pickup_lng}`:r.pickup; else q=r.drop_lat&&r.drop_lng?`${r.drop_lat},${r.drop_lng}`:r.drop; return 'https://www.google.com/maps/search/?api=1&query='+enc(q||'Kalna');}
function rideCard(r, actions){const nav=`<a class="btn dark" target="_blank" rel="noopener" href="${esc(mapLink(r,'pickup'))}">Pickup Map</a><a class="btn dark" target="_blank" rel="noopener" href="${esc(mapLink(r,'drop'))}">Drop Map</a>`; return `<div class="card"><b>${esc(r.pickup)} → ${esc(r.drop)}</b><p class="muted">Status: ${esc(r.status)} · Fare ₹${esc(r.estimated_fare||0)} · ${r.dispatch_accept_time_left_seconds!==undefined?'Accept left '+esc(r.dispatch_accept_time_left_seconds)+'s · ':''}${esc(r.source||'')}</p>${nav}<br>${actions.map(a=>`<button class="${esc(a.cls||'')}" onclick="rideAction('${esc(r.id)}','${esc(a.act)}')">${esc(a.label)}</button>`).join('')}</div>`}
async function rideAction(id,act){try{let body={}; if(act==='start') body.otp=prompt('Passenger OTP দিন')||''; await api('/api/rides/'+encodeURIComponent(id)+'/'+encodeURIComponent(act),{method:'POST',body:JSON.stringify(body)}); heartbeat(); loadDash()}catch(e){alert(e.message)}}
async function loadDevices(){try{const j=await api('/api/driver/devices'); $('devices').innerHTML='<h2>Trusted Devices</h2>'+(j.devices||[]).map(d=>`<div class="card"><b>${esc(d.device_name||d.device_id)}</b><p class="muted small">${esc(d.platform)} · trusted ${d.trusted?'yes':'no'} · active ${d.active?'yes':'no'}<br>Last seen: ${esc(d.last_seen_at||'')}</p>${d.active?`<button class="danger" onclick="revokeDevice('${esc(d.id)}')">Revoke</button>`:''}</div>`).join('');}catch(e){$('devices').innerHTML='<div class="card bad">'+esc(e.message)+'</div>'}}
async function revokeDevice(id){if(!confirm('এই device revoke করবেন?'))return; try{await api('/api/driver/devices/'+encodeURIComponent(id)+'/revoke',{method:'POST',body:'{}'}); loadDevices();}catch(e){alert(e.message)}}
async function loadDash(){try{const j=await api('/api/driver/simple-dashboard'); $('dash').innerHTML=`<div class="grid"><div class="stat"><b>${j.driver_profile.online?'Online':'Offline'}</b><br><span class="muted">Status</span></div><div class="stat"><b>${esc(j.today.rides)}</b><br><span class="muted">Today Rides</span></div><div class="stat"><b>₹${esc(j.today.earnings)}</b><br><span class="muted">Earnings</span></div></div><p class="muted">Trusted device login active: ${refreshToken?'Yes':'No'}<br>${esc(j.gps_health?.status_text||'')}<br>Dispatch: ${esc(j.dispatch?.engine||'')} · timeout ${esc(j.dispatch?.accept_timeout_seconds||30)}s</p>`; const reqHtml=(j.pending_requests||[]).map(r=>rideCard(r,[{act:'accept',label:'Accept'},{act:'reject',label:'Reject',cls:'danger'}])).join(''); $('requests').innerHTML='<h2>New Requests</h2>'+(reqHtml || '<p>No request</p>'); const actHtml=(j.active_rides||[]).map(r=>rideCard(r,[{act:'arrive',label:'Reached Pickup'},{act:'start',label:'Start Ride'},{act:'complete',label:'Reached Drop / Complete'}])).join(''); $('active').innerHTML='<h2>Active Rides</h2>'+(actHtml || '<p>No active ride</p>');}catch(e){$('dash').innerHTML='<span class="bad">'+esc(e.message)+'</span>'}}
(async()=>{if(token) loadDash(); else if(refreshToken && await refreshSession()) loadDash(); else $('dash').textContent='Please login with driver OTP/token';})(); setInterval(()=>{if(token) heartbeat()},12000);
</script></body></html>
