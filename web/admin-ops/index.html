<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride · Admin Ops</title><style>
:root{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#eaf0ff;background:#071126}body{margin:0}.wrap{max-width:1180px;margin:auto;padding:22px}.top{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap}.card{background:#101d3f;border:1px solid #243669;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 12px 28px #0004}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.pill{display:inline-block;border-radius:999px;background:#17335f;padding:6px 10px;color:#8eeaff;font-weight:800}.bad{color:#ffb4b4}.ok{color:#a8ffcc}.muted{color:#aab8e8}button,input,select,textarea{border-radius:12px;border:1px solid #30467f;background:#081534;color:#fff;padding:10px}button{cursor:pointer;background:#1263ff;font-weight:800}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #283b6b;padding:9px;text-align:left;vertical-align:top}.ride{font-weight:800}.small{font-size:12px}.row{display:flex;gap:8px;flex-wrap:wrap}.danger{background:#7a1e26}.warn{background:#7b5600}.ghost{background:#16234d}</style></head><body><div class="wrap"><div class="top"><div><h1>Admin Ride Ops · Fraud · Support</h1><p class="muted">Sprint-7M operations center. Main/Admin token দিয়ে login করে live ride control দেখুন।</p></div><a class="pill" href="/">Home</a></div><div class="card"><div class="row"><input id="token" placeholder="Admin bearer token" style="min-width:320px;flex:1"><button onclick="load()">Load Dashboard</button><button class="ghost" onclick="localStorage.setItem('nexo_admin_token',token.value)">Save Token</button></div><p class="muted small">Token না থাকলে Main Admin web app থেকে login করে token ব্যবহার করুন। Full secret/data এখানে দেখানো হয় না।</p></div><div id="out"></div></div><script>
const token=document.getElementById('token'); token.value=localStorage.getItem('nexo_admin_token')||'';
async function api(path, opt={}){opt.headers={...(opt.headers||{}),'Content-Type':'application/json',Authorization:'Bearer '+token.value}; const r=await fetch(path,opt); const j=await r.json().catch(()=>({detail:'Bad response'})); if(!r.ok) throw new Error(j.detail||JSON.stringify(j)); return j;}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function card(title, html){return `<div class="card"><h2>${esc(title)}</h2>${html}</div>`}
function rideRows(list){ if(!list||!list.length)return '<p class="muted">No rides</p>'; return `<table><tr><th>Ride</th><th>Status</th><th>Payment</th><th>Action</th></tr>${list.map(r=>`<tr><td><div class="ride">${esc(r.pickup)} → ${esc(r.drop)}</div><div class="small muted">${esc(r.id)} · ₹${esc(r.estimated_fare||'')}</div></td><td>${esc(r.status)}</td><td>${esc(r.payment_status)}</td><td><div class="row"><button onclick="act('${esc(r.id)}','REASSIGN_DRIVER')">Reassign</button><button class="warn" onclick="act('${esc(r.id)}','RESEND_OTP')">OTP</button><button class="ghost" onclick="act('${esc(r.id)}','MARK_PAYMENT_RESOLVED')">Payment OK</button><button class="danger" onclick="act('${esc(r.id)}','FORCE_CANCEL')">Cancel</button></div></td></tr>`).join('')}</table>`;}
async function act(id, action){const note=prompt(action+' note/reason','Admin action from Ops Center')||''; try{await api('/api/admin/rides/'+encodeURIComponent(id)+'/intervention',{method:'POST',body:JSON.stringify({action,note})}); await load();}catch(e){alert(e.message)}}
async function load(){try{localStorage.setItem('nexo_admin_token',token.value); const d=await api('/api/admin/ride-ops'); const b=d.buckets||{}; document.getElementById('out').innerHTML = `<div class="grid">${Object.entries(d.summary||{}).filter(([k,v])=>typeof v!=='object').map(([k,v])=>`<div class="card"><div class="muted small">${esc(k)}</div><div style="font-size:28px;font-weight:900">${esc(v)}</div></div>`).join('')}</div>` + card('Searching Driver',rideRows(b.SEARCHING_DRIVER)) + card('Payment Pending',rideRows(b.PAYMENT_PENDING)) + card('Driver Assigned / OTP Pending',rideRows([...(b.DRIVER_ASSIGNED_NOT_STARTED||[]),...(b.OTP_PENDING||[])])) + card('Active / Drop Confirm Pending',rideRows([...(b.ACTIVE_RIDE||[]),...(b.DROP_CONFIRM_PENDING||[])])) + card('Driver Misuse Alerts',(d.driver_misuse?.alerts||[]).map(a=>`<p><b class="bad">${esc(a.type)}</b> ${esc(a.driver_name||a.driver_user_id)} ${esc(a.mobile||'')} ${esc(a.ride_id||'')} <span class="muted">${esc(a.action)}</span></p>`).join('')||'<p class="ok">No active alerts</p>') + card('Support / Refund',`<p>Open support: <b>${esc(d.support?.summary?.open_tickets||0)}</b> · Pending refunds: <b>${esc(d.support?.summary?.pending_refunds||0)}</b></p>`) + card('Recent Manual Actions',(d.recent_manual_actions||[]).map(a=>`<p><b>${esc(a.action)}</b> ${esc(a.ride_id)} <span class="muted">${esc(a.at)}</span><br>${esc(a.note)}</p>`).join('')||'<p class="muted">No actions</p>');}catch(e){document.getElementById('out').innerHTML='<div class="card bad">'+esc(e.message)+'</div>';}}
</script></body></html>
