<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride · Pilot Launch</title><style>
:root{color-scheme:dark}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#071026;color:#eef5ff}.wrap{max-width:1180px;margin:auto;padding:22px}.hero{background:linear-gradient(135deg,#102452,#0d6b67);border:1px solid #2e5f91;border-radius:24px;padding:24px;box-shadow:0 18px 60px #0008}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-top:16px}.card{background:#0d1835;border:1px solid #263d72;border-radius:18px;padding:16px}.ok{color:#6dffbd}.bad{color:#ff7b9b}.warn{color:#ffd166}.muted{color:#aebce5}button,input,select,textarea{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #2d4e88;background:#091633;color:#fff;padding:11px;margin:6px 0}button{background:#00a7ff;color:#03101d;font-weight:900;cursor:pointer}.danger{background:#ff5577;color:#fff}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:720px){.row{grid-template-columns:1fr}}pre{white-space:pre-wrap;background:#061126;border-radius:14px;padding:12px;border:1px solid #203767;max-height:360px;overflow:auto}.pill{display:inline-block;padding:5px 10px;border-radius:999px;background:#142a5a;margin:3px;font-size:12px}.nav a{display:inline-block;color:#7df9ff;text-decoration:none;margin:8px 10px 0 0}</style></head><body><div class="wrap"><div class="hero"><h1>🚦 NEXO Ride Pilot Launch Center</h1><p class="muted">10–50 driver pilot launch, go/no-go gate, daily ops report, rollback/emergency readiness. Live <code>data/</code> overwrite করবেন না।</p><div class="nav"><a href="/field-test/">Field Test</a><a href="/release/">Release QA</a><a href="/admin-ops/">Admin Ops</a><a href="/admin-safety/">Safety</a><a href="/admin-finance/">Finance</a><a href="/admin/config-center/">Config Center</a></div></div>
<div class="grid" id="cards"></div>
<div class="row"><div class="card"><h2>Daily Pilot Report</h2><input id="token" placeholder="Admin token"><input id="date" type="date"><select id="stage"><option>PREP</option><option>READY_FOR_FIELD_TEST</option><option>PILOT_RUNNING</option><option>PILOT_PAUSED</option><option>PUBLIC_READY</option><option>ROLLBACK</option></select><input id="drivers_online" placeholder="Drivers online"><input id="completed_rides" placeholder="Completed rides"><input id="payment_issues" placeholder="Payment issues"><input id="dispatch_issues" placeholder="Dispatch issues"><input id="safety_issues" placeholder="Safety issues"><textarea id="notes" rows="4" placeholder="Pilot day notes"></textarea><button onclick="saveReport()">Save Daily Report</button><button onclick="setStage()">Update Stage</button><button class="danger" onclick="rollbackStage()">Mark Rollback Stage</button></div><div class="card"><h2>Readiness / Go-Live Gate</h2><button onclick="loadAll()">Refresh</button><pre id="out">Loading...</pre></div></div>
<div class="card"><h2>Rollback Plan</h2><div id="rollback"></div></div></div><script>
const $=id=>document.getElementById(id); const hdr=()=>({'Content-Type':'application/json','Authorization':'Bearer '+$('token').value.trim()});
async function j(url,opt){const r=await fetch(url,opt); const t=await r.text(); try{return JSON.parse(t)}catch(e){return {ok:false,raw:t,status:r.status}}}
function v(x){return x===true?'<span class="ok">READY</span>':'<span class="bad">BLOCKED</span>'}
function card(title,val,sub,cls=''){return `<div class="card"><div class="muted">${title}</div><h2 class="${cls}">${val}</h2><div class="muted">${sub||''}</div></div>`}
async function loadAll(){const a=await j('/api/platform/pilot-launch-readiness'); const b=await j('/api/platform/pilot-go-live-gate'); let c={}; if($('token').value.trim()) c=await j('/api/admin/pilot-dashboard',{headers:hdr()}); const s=a.summary||{}; const ride=s.ride||{}; const drv=s.driver||{}; const issues=s.issues||{}; $('cards').innerHTML=card('Pilot Readiness',v(a.ok),a.blockers?.length?`${a.blockers.length} blocker(s)`:'No blockers')+card('Go Live Gate',v(b.ok),b.stage||'')+card('Approved Drivers',drv.approved||0,`Online: ${drv.online||0}`)+card('Completed Pilot Rides',ride.completed||0,`Active: ${ride.active||0}`)+card('Open Issues',issues.open||0,`Critical: ${issues.critical||0}`,issues.critical?'bad':''); $('out').textContent=JSON.stringify({readiness:a,go_live_gate:b,admin_dashboard:c},null,2); $('rollback').innerHTML=(a.settings?.rollback_steps||[]).map(x=>`<span class="pill">${x}</span>`).join('');}
async function saveReport(){const body={date:$('date').value,stage:$('stage').value,drivers_online:$('drivers_online').value,completed_rides:$('completed_rides').value,payment_issues:$('payment_issues').value,dispatch_issues:$('dispatch_issues').value,safety_issues:$('safety_issues').value,notes:$('notes').value,ops_checked:true}; $('out').textContent=JSON.stringify(await j('/api/admin/pilot/daily-report',{method:'POST',headers:hdr(),body:JSON.stringify(body)}),null,2); loadAll();}
async function setStage(){const body={stage:$('stage').value,reason:$('notes').value}; $('out').textContent=JSON.stringify(await j('/api/admin/pilot/stage',{method:'POST',headers:hdr(),body:JSON.stringify(body)}),null,2); loadAll();}
async function rollbackStage(){const body={stage:'ROLLBACK',reason:$('notes').value||'Pilot rollback marked by admin'}; $('out').textContent=JSON.stringify(await j('/api/admin/pilot/stage',{method:'POST',headers:hdr(),body:JSON.stringify(body)}),null,2); loadAll();}
$('date').value=new Date().toISOString().slice(0,10); loadAll();
</script></body></html>
