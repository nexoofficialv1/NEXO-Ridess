<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Safety Center</title><style>body{margin:0;font-family:system-ui;background:#07111f;color:#eef6ff}.wrap{max-width:1180px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.card{background:#101d33;border:1px solid #243a60;border-radius:18px;padding:16px;box-shadow:0 12px 30px #0004}.num{font-size:32px;font-weight:900;color:#7df9ff}.bad{color:#ff8080}.ok{color:#8fffbb}button,input,select,textarea{border:0;border-radius:12px;padding:10px;margin:4px;background:#172843;color:#fff}button{background:#00a884;font-weight:800;cursor:pointer}.list{display:grid;gap:10px}.item{border-left:4px solid #00a884}.critical{border-left-color:#ff4242}.muted{color:#aab9d6;font-size:13px}a{color:#7df9ff}</style></head><body><div class="wrap"><div class="top"><div><h1>🛡️ NEXO Safety Center</h1><div class="muted">SOS · Trip Share · Route Deviation · Driver Safety Notes</div></div><div><input id="token" placeholder="Admin token"><button onclick="saveToken()">Save Token</button><button onclick="load()">Refresh</button></div></div><div id="cards" class="grid"></div><h2>Open SOS / Safety Events</h2><div id="events" class="list"></div><h2>Route Deviation Alerts</h2><div id="devs" class="list"></div><h2>Driver Safety Notes</h2><div id="notes" class="list"></div></div><script>const $=id=>document.getElementById(id); $('token').value=localStorage.nexo_admin_token||''; function saveToken(){localStorage.nexo_admin_token=$('token').value.trim(); alert('Saved');} async function api(p,o={}){o.headers={...(o.headers||{}),'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.nexo_admin_token||'')}; const r=await fetch(p,o); const j=await r.json().catch(()=>({detail:'Bad response'})); if(!r.ok) throw new Error(j.detail||'API error'); return j;} function item(x,cls=''){return `<div class="card item ${cls}"><b>${x.event_type||x.type||x.severity||'EVENT'}</b> <span class="muted">${x.status||''} · ${x.created_at||''}</span><p>${x.reason||x.note||''}</p><div>${x.pickup||''} ${x.drop?'→ '+x.drop:''}</div><div class="muted">Ride: ${x.ride_id||''}</div>${x.status==='OPEN'&&x.id?`<button onclick="closeEv('${x.id}')">Close</button>`:''}</div>`} async function closeEv(id){await api('/api/admin/safety-events/'+id+'/update',{method:'POST',body:JSON.stringify({status:'CLOSED',note:'Closed from Safety Center'})}); load();} async function load(){try{const d=await api('/api/admin/safety-dashboard'); const s=d.summary||{}; $('cards').innerHTML=[['Active SOS',s.active_sos,'bad'],['Open Safety',s.open_safety_events,'bad'],['Route Alerts',s.route_deviation_open,'bad'],['Driver Notes',s.driver_notes_open,'ok'],['Trip Shares',s.trip_shares,'ok'],['Active Rides',s.active_rides,'ok']].map(x=>`<div class="card"><div class="muted">${x[0]}</div><div class="num ${x[2]}">${x[1]||0}</div></div>`).join(''); $('events').innerHTML=(d.active_sos||[]).map(x=>item(x,x.priority==='CRITICAL'?'critical':'')).join('')||'<div class="muted">No open events</div>'; $('devs').innerHTML=(d.route_deviations||[]).map(x=>item({...x,reason:`${x.distance_to_target_km} km from ${x.target_status}`},'critical')).join('')||'<div class="muted">No route alerts</div>'; $('notes').innerHTML=(d.driver_notes||[]).map(x=>item(x)).join('')||'<div class="muted">No driver notes</div>';}catch(e){$('cards').innerHTML='<div class="card bad">'+e.message+'</div>';}} load(); setInterval(load,15000);</script></body></html>
