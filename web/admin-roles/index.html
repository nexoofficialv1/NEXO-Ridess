<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Role Security Center</title><style>body{margin:0;font-family:system-ui,Noto Sans Bengali,sans-serif;background:#07111f;color:#eef6ff}.wrap{max-width:1180px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.card{background:#101d33;border:1px solid #27446c;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 12px 28px #0005}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.num{font-size:28px;font-weight:900;color:#7df9ff}.muted{color:#aab9d6;font-size:13px}button,input,select,textarea{border:0;border-radius:12px;padding:10px;margin:4px;background:#172843;color:#fff}button{background:#00a884;font-weight:800;cursor:pointer}.bad{color:#ff8585}.ok{color:#8fffbb}.row{display:grid;grid-template-columns:1fr 120px 1.5fr 120px;gap:8px;align-items:center;border-top:1px solid #223956;padding:8px}.pill{display:inline-block;background:#213b60;border-radius:999px;padding:4px 8px;margin:2px;font-size:12px}@media(max-width:800px){.row{grid-template-columns:1fr}.top{align-items:flex-start}}</style></head><body><div class="wrap"><div class="top"><div><h1>🔐 Role Security Center</h1><div class="muted">Main Admin · Safety Admin · Finance Admin · Support Admin access lock</div></div><div><input id="token" placeholder="Main Admin token"><button onclick="saveToken()">Save Token</button><button onclick="load()">Refresh</button></div></div><div id="summary" class="grid"></div><div class="card"><h2>Assign Role</h2><input id="user_id" placeholder="User ID / mobile / email"><select id="role"><option>SAFETY_ADMIN</option><option>FINANCE_ADMIN</option><option>SUPPORT_ADMIN</option><option>KYC_ADMIN</option><option>OPS_ADMIN</option><option>AREA_ADMIN</option><option>SUB_ADMIN</option><option>ADMIN</option><option>DRIVER</option><option>PASSENGER</option></select><input id="note" placeholder="Note"><button onclick="assignRole()">Assign Role</button><div class="muted">Secrets/Production Mode সবসময় Main Admin only থাকবে।</div></div><div class="card"><h2>Role Matrix</h2><div id="matrix"></div></div><div class="card"><h2>Users</h2><div id="users"></div></div><div class="card"><h2>Security Audit</h2><pre id="audit" style="white-space:pre-wrap;background:#07111f;padding:12px;border-radius:12px">Ready</pre></div></div><script>const $=id=>document.getElementById(id);const esc=x=>String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));$('token').value=localStorage.nexo_admin_token||localStorage.nexoRideAdminTokenStandalone||'';function saveToken(){localStorage.nexo_admin_token=$('token').value.trim();localStorage.nexoRideAdminTokenStandalone=$('token').value.trim();alert('Saved')}async function api(p,o={}){o.headers={...(o.headers||{}),'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.nexo_admin_token||$('token').value.trim())};const r=await fetch(p,o);const j=await r.json().catch(()=>({detail:'Bad response'}));if(!r.ok)throw new Error(j.detail||'API error');return j}function caps(a){return (a||[]).map(x=>`<span class="pill">${esc(x)}</span>`).join('')}async function load(){try{const d=await api('/api/admin/roles-security');const r=d.readiness||{};$('summary').innerHTML=[['Readiness',r.ok?'OK':'Check',r.ok?'ok':'bad'],['Policies',r.policy_count||0,'ok'],['Users',(d.users||[]).length,'ok'],['Audit',(d.audit||[]).length,'ok']].map(x=>`<div class="card"><div class="muted">${x[0]}</div><div class="num ${x[2]}">${x[1]}</div></div>`).join('');$('matrix').innerHTML=Object.entries(d.role_matrix||{}).map(([k,v])=>`<div class="card"><b>${esc(k)}</b><div>${caps(v)}</div></div>`).join('');$('users').innerHTML=(d.users||[]).map(u=>`<div class="row"><div><b>${esc(u.name||u.mobile||u.email||u.id)}</b><div class="muted">${esc(u.mobile||'')} ${esc(u.email||'')}</div></div><div>${esc(u.role)}</div><div>${caps(u.capabilities)}</div><button onclick="pick('${esc(u.id)}')">Pick</button></div>`).join('');const a=await api('/api/admin/security-audit');$('audit').textContent=JSON.stringify(a,null,2)}catch(e){$('summary').innerHTML='<div class="card bad">'+esc(e.message)+'</div>'}}function pick(id){$('user_id').value=id;scrollTo(0,0)}async function assignRole(){try{if(!confirm('Role change করবেন?'))return;const d=await api('/api/admin/roles-security/assign',{method:'POST',body:JSON.stringify({user_id:$('user_id').value,role:$('role').value,note:$('note').value})});$('audit').textContent=JSON.stringify(d,null,2);load()}catch(e){alert(e.message)}}load()</script></body></html>
