<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>NEXO Ride Admin Config Center</title>
<style>
:root{--bg:#f5f8ff;--card:#fff;--text:#101828;--muted:#667085;--blue:#0b74de;--blue2:#07539e;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans Bengali,sans-serif;background:linear-gradient(180deg,#eef6ff,#fff);color:var(--text)}.wrap{max-width:1180px;margin:0 auto;padding:16px 12px 80px}.top{position:sticky;top:8px;z-index:2;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-radius:22px;padding:16px;display:flex;justify-content:space-between;gap:12px;align-items:center;box-shadow:0 16px 40px rgba(16,24,40,.14)}h1,h2,p{margin:0}.top p{color:#e8f4ff}.badge{background:#fff;color:var(--blue2);padding:8px 12px;border-radius:999px;font-weight:900}.card{background:var(--card);border:1px solid #d9e7f5;border-radius:22px;padding:16px;margin-top:14px;box-shadow:0 10px 25px rgba(16,24,40,.06)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:#f8fbff;border:1px solid #d9e7f5;border-radius:18px;padding:14px}.stat b{font-size:24px;color:var(--blue2);display:block}.muted,.stat span{color:var(--muted);font-size:13px}.row{display:grid;grid-template-columns:180px 1fr 160px 160px;gap:10px;align-items:start;background:#f8fbff;border:1px solid #d9e7f5;border-radius:18px;padding:12px;margin-top:10px}.row b{display:block}.ok{color:var(--ok);font-weight:900}.bad{color:var(--bad);font-weight:900}.warn{color:var(--warn);font-weight:900}input,textarea,select{width:100%;border:1px solid #d0ddeb;border-radius:14px;padding:12px;font-size:15px;background:#fff;color:#101828}textarea{min-height:92px}button{border:0;border-radius:14px;padding:11px 14px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;cursor:pointer}button.secondary{background:#eaf5ff;color:var(--blue2);border:1px solid #cfe8ff}button.danger{background:linear-gradient(135deg,#dc2626,#f97316)}.btns{display:flex;gap:8px;flex-wrap:wrap}.alert{border:1px solid #fecaca;background:#fff1f2;color:#991b1b;border-radius:14px;padding:12px;margin-top:10px}.success{border:1px solid #bbf7d0;background:#f0fdf4;color:#166534;border-radius:14px;padding:12px;margin-top:10px}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#eaf5ff;color:#07539e;font-size:12px;font-weight:800}.login{max-width:430px;margin:50px auto}.hide{display:none}@media(max-width:850px){.grid{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.btns button{flex:1}}
</style>
</head><body><div class="wrap"><div id="root"></div></div>
<script>
const API='/api'; const TOKEN_KEY='nexoRideAdminTokenStandalone'; let token=localStorage.getItem(TOKEN_KEY)||''; const $=s=>document.querySelector(s); const esc=x=>String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function api(path,opts={}){const r=await fetch(API+path,{method:opts.method||'GET',headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})},body:opts.body?JSON.stringify(opts.body):undefined});let d={};try{d=await r.json()}catch(e){}if(!r.ok)throw new Error(d.detail||'Server error');return d;}
function loginView(msg=''){root.innerHTML=`<section class="card login"><h1>🔐 Admin Config Center</h1><p class="muted">Main Admin only · Payment, Maps, FCM, JWT/Session Secret</p>${msg?`<div class="alert">${esc(msg)}</div>`:''}<input id="login" placeholder="Admin email/mobile"><input id="password" type="password" placeholder="Password"><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="consent" type="checkbox" style="width:auto"> Secret configuration responsibility মানছি</label><button style="width:100%;margin-top:12px" onclick="login()">Login</button><p class="muted" style="margin-top:10px">Existing Admin token থাকলে auto open হবে।</p></section>`}
async function login(){try{if(!$('#consent').checked)return alert('Consent tick করুন');const d=await api('/auth/login',{method:'POST',body:{login:$('#login').value.trim(),password:$('#password').value}});token=d.token;localStorage.setItem(TOKEN_KEY,token);render();}catch(e){loginView(e.message)}}
function logout(){localStorage.removeItem(TOKEN_KEY);token='';loginView();}
function top(d){return `<header class="top"><div><h1>NEXO Ride Admin Config Center</h1><p>Encrypted Config Vault · Production Service Integration Lock · Sprint-7L</p></div><div class="btns"><button class="secondary" onclick="location.href='/admin/'">Admin</button><button class="secondary" onclick="location.href='/release/'">Release QA</button><button class="secondary" onclick="logout()">Logout</button></div></header>`}
function formRow(item){const k=item.key; const multi=item.multiline; const bool=item.boolean; const input=bool?`<select id="v_${k}"><option value="false">false</option><option value="true" ${item.configured?'selected':''}>true</option></select>`:(multi?`<textarea id="v_${k}" placeholder="${esc(item.placeholder||'')}"></textarea>`:`<input id="v_${k}" placeholder="${esc(item.placeholder||'')}">`);return `<div class="row"><div><b>${esc(item.label)}</b><span class="pill">${esc(item.group)}</span>${item.required_for_production?` <span class="pill">Required</span>`:''}</div><div><small class="muted">Current: ${esc(item.masked||'Not configured')} · Source: ${esc(item.source)}</small>${item.rotation_warning?'<div class="alert">এই secret বদলালে current login/session invalid হতে পারে।</div>':''}${input}</div><div class="${item.configured?'ok':'bad'}">${item.configured?'CONFIGURED':'MISSING'}</div><div class="btns"><button onclick="saveOne('${k}')">Save</button><button class="danger" onclick="removeOne('${k}')">Remove</button></div></div>`}
function checksHtml(list){return (list||[]).map(c=>`<div class="row" style="grid-template-columns:80px 1fr 160px"><div>${c.ok?'✅':'⚠️'}</div><div><b>${esc(c.title)}</b><small class="muted">${esc(c.detail||'')}</small></div><div class="${c.ok?'ok':'bad'}">${c.ok?'OK':'BLOCKER'}</div></div>`).join('')}
async function render(){if(!token)return loginView();try{const d=await api('/admin/config-center');const r=d.readiness||{};root.innerHTML=top(d)+`<section class="card"><div class="grid"><div class="stat"><b>${r.score_percent||0}%</b><span>Readiness</span></div><div class="stat"><b>${d.production_mode?'ON':'OFF'}</b><span>Production Mode</span></div><div class="stat"><b>${r.configured_count||0}/${r.total_keys||0}</b><span>Configured Keys</span></div><div class="stat"><b>${(r.blockers||[]).length}</b><span>Blockers</span></div></div>${(r.blockers||[]).length?`<div class="alert">Production blockers: ${esc(r.blockers.join(', '))}</div>`:'<div class="success">Config Center ready. Secret values are masked and encrypted.</div>'}<div class="btns" style="margin-top:12px"><button onclick="setProd(true)">Production Mode ON</button><button class="secondary" onclick="setProd(false)">Production Mode OFF</button><button class="secondary" onclick="test('ALL')">Test All</button><button class="secondary" onclick="test('PAYMENT')">Test Payment</button><button class="secondary" onclick="test('MAPS')">Test Maps</button><button class="secondary" onclick="test('FCM')">Test FCM</button></div></section><section class="card"><h2>Service Secrets</h2><p class="muted">Full secret কখনো UI-তে দেখানো হবে না। Save করলে encrypted vault-এ থাকবে। ENV থাকলেও Admin Vault preferred থাকবে।</p>${(d.items||[]).map(formRow).join('')}</section><section class="card"><h2>Production Validator</h2>${checksHtml(r.checks)}</section><section class="card"><h2>Audit Log</h2>${(d.audit||[]).map(a=>`<div class="row" style="grid-template-columns:200px 1fr 140px"><div>${esc((a.at||'').slice(0,19))}</div><div><b>${esc(a.action)} · ${esc(a.key||'')}</b><small class="muted">Actor: ${esc(a.actor_id||'')}</small></div><div>${esc(a.source||'')}</div></div>`).join('')||'<p class="muted">No config changes yet.</p>'}</section><section class="card"><h2>Test Result</h2><pre id="result" style="white-space:pre-wrap;background:#0b1220;color:#e6f4ff;padding:12px;border-radius:14px;min-height:80px">Ready</pre></section>`}catch(e){if(String(e.message).includes('Login'))return loginView(e.message);root.innerHTML=`<section class="card"><div class="alert">${esc(e.message)}</div><button onclick="logout()">Login Again</button></section>`}}
async function saveOne(k){try{const v=$('#v_'+k).value;const d=await api('/admin/config-center',{method:'POST',body:{items:[{key:k,value:v}]}});$('#result').textContent=JSON.stringify(d.results,null,2);render();}catch(e){alert(e.message)}}
async function removeOne(k){try{if(!confirm(k+' remove করবেন?'))return;const d=await api('/admin/config-center/remove',{method:'POST',body:{key:k}});$('#result').textContent=JSON.stringify(d,null,2);render();}catch(e){alert(e.message)}}
async function setProd(enabled){try{const d=await api('/admin/config-center/production-mode',{method:'POST',body:{enabled}});$('#result').textContent=JSON.stringify(d,null,2);render();}catch(e){alert(e.message)}}
async function test(service){try{const d=await api('/admin/config-center/test',{method:'POST',body:{service}});$('#result').textContent=JSON.stringify(d,null,2);}catch(e){alert(e.message)}}
render();
</script></body></html>
