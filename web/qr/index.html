<!doctype html>
<html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride QR Booking</title>
<style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#071022;color:#fff}.wrap{max-width:560px;margin:auto;padding:18px}.card{background:#101a36;border:1px solid #23376e;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 10px 30px #0006}h1{font-size:26px;margin:8px 0}.muted{color:#aebbe8}label{display:block;margin:12px 0 6px;font-weight:700}input,select{width:100%;box-sizing:border-box;padding:14px;border-radius:14px;border:1px solid #324a88;background:#081229;color:#fff;font-size:16px}button{width:100%;border:0;border-radius:16px;padding:15px;margin-top:12px;background:#30e7ff;color:#00111a;font-weight:900;font-size:16px}.secondary{background:#22345f;color:#fff}.ok{color:#69ffad}.bad{color:#ff8585}.pill,.suggestion{display:inline-block;padding:8px 11px;border-radius:999px;background:#1d2d55;margin:4px;cursor:pointer;border:0;color:#fff}.fare{font-size:30px;font-weight:900;color:#69ffad}.hint{font-size:13px;margin-top:4px}.suggestions{margin:8px 0}.mapbox{border:1px dashed #35518c;border-radius:16px;padding:12px;margin-top:8px;background:#081229}.mapbox a{color:#69ffad}</style></head>
<body><div class="wrap"><h1>🚖 NEXO Ride QR Booking</h1><p class="muted">QR scan করে দ্রুত Toto booking করুন। Account ছাড়াও booking করা যাবে।</p>
<div class="card"><label>নাম</label><input id="name" maxlength="80" placeholder="Passenger name"><label>মোবাইল নম্বর</label><input id="mobile" inputmode="tel" maxlength="10" pattern="[6-9][0-9]{9}" placeholder="10 digit mobile"><div id="mobileHint" class="hint muted">ভারতীয় 10 digit mobile number দিন।</div><label>Pickup</label><input id="pickup" maxlength="140" placeholder="Pickup location" autocomplete="off"><div id="pickupSuggest" class="suggestions"></div><button class="secondary" onclick="useLocation()">📍 My Current Location / আমার লোকেশন</button><div id="pickupMap" class="mapbox muted">GPS দিলে আপনার pickup geo-tag এখানে দেখা যাবে।</div><label>Destination</label><input id="drop" maxlength="140" placeholder="Where to go?" autocomplete="off"><div id="dropSuggest" class="suggestions"></div><label>Ride Type</label><select id="ride_type"><option value="FULL">Full Toto</option><option value="SHARING">Sharing</option></select><button onclick="estimate()">Fare Estimate</button><button onclick="book()">Confirm Booking</button><button class="secondary" onclick="logoutQr()">Clear Saved Session</button></div>
<div class="card" id="result"><b>Status:</b> Ready</div>
<div class="card"><b>Popular Places</b><div id="places" class="muted">Loading...</div></div>
</div><script>
let gps={}; let placeNames=[]; const $=id=>document.getElementById(id); let lastRide=null; let token=sessionStorage.getItem('nexo_qr_token')||''; let guestRideToken=sessionStorage.getItem('nexo_guest_ride_token')||'';
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function msg(html){$('result').innerHTML=html} function msgText(text,cls=''){ $('result').className='card '+cls; $('result').textContent=text; }
function validMobile(){return /^[6-9]\d{9}$/.test(String($('mobile').value||'').trim())}
$('mobile').addEventListener('input',()=>{$('mobile').value=$('mobile').value.replace(/\D/g,'').slice(0,10); $('mobileHint').textContent=validMobile()?'Mobile number ok':'ভারতীয় 10 digit mobile number দিন।'; $('mobileHint').className='hint '+(validMobile()?'ok':'muted')});
async function api(path, opts={}){opts.headers={...(opts.headers||{}),'Content-Type':'application/json'}; if(token) opts.headers.Authorization='Bearer '+token; const r=await fetch(path,opts); const j=await r.json().catch(()=>({detail:'Invalid response'})); if(!r.ok) throw new Error(j.detail||'Request failed'); return j;}
function renderSuggestions(type){const q=String($(type).value||'').toLowerCase().trim();const list=(q?placeNames.filter(p=>p.toLowerCase().includes(q)):placeNames).slice(0,8);const box=$(type+'Suggest');box.innerHTML=list.map(p=>`<button type="button" class="suggestion" onclick="setInput('${type}','${esc(p).replace(/'/g,'&#39;')}')">📍 ${esc(p)}</button>`).join('') || '<span class="muted">Suggestion নেই</span>';}
function setInput(type,v){$(type).value=v; renderSuggestions(type)}
async function load(){try{const j=await api('/api/qr/config'); placeNames=(j.places||[]).map(p=>String(p.name||'')).filter(Boolean); const box=$('places'); box.textContent=''; placeNames.slice(0,12).forEach(p=>{const sp=document.createElement('span'); sp.className='pill'; sp.textContent=p; sp.onclick=()=>setPlace(p); box.appendChild(sp);}); if(!box.childNodes.length) box.textContent='No places configured'; renderSuggestions('pickup'); renderSuggestions('drop');}catch(e){$('places').textContent=e.message}}
$('pickup').addEventListener('input',()=>renderSuggestions('pickup'));$('pickup').addEventListener('focus',()=>renderSuggestions('pickup'));$('drop').addEventListener('input',()=>renderSuggestions('drop'));$('drop').addEventListener('focus',()=>renderSuggestions('drop'));
function setPlace(v){ if(!$('pickup').value) setInput('pickup',v); else setInput('drop',v); }
function useLocation(){ if(!navigator.geolocation) return msgText('Location not supported','bad'); msgText('Location নিচ্ছে... permission Allow করুন','muted'); navigator.geolocation.getCurrentPosition(p=>{gps={lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy,pickup_lat:p.coords.latitude,pickup_lng:p.coords.longitude}; const txt=`My Location ${gps.lat.toFixed(5)},${gps.lng.toFixed(5)}`; $('pickup').value=txt; $('pickupMap').innerHTML=`<b class="ok">📍 Current pickup set</b><br>${esc(txt)}<br><a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(gps.lat+','+gps.lng)}">Google Map-এ দেখুন</a>`; msg('<span class="ok">Current location set</span>')},e=>msgText('Location permission denied / GPS ON করুন','bad'),{enableHighAccuracy:true,timeout:12000,maximumAge:10000});}
function body(){return {name:$('name').value,mobile:$('mobile').value,pickup:$('pickup').value,drop:$('drop').value,ride_type:$('ride_type').value,...gps}}
async function estimate(){try{if(!validMobile()) return msgText('Valid 10 digit mobile number required','bad'); if(!$('pickup').value||!$('drop').value)return msgText('Pickup এবং Destination দিন','bad'); const j=await api('/api/qr/fare',{method:'POST',body:JSON.stringify(body())}); msg(`<div>Estimated Fare</div><div class="fare">₹${esc(j.fare.estimated_fare)}</div><div class="muted">Distance ${esc(j.fare.distance_km)} km · ETA ${esc(j.route.eta_minutes)} min</div>`)}catch(e){msg('<span class="bad">'+esc(e.message)+'</span>')}}
async function book(){try{if(!validMobile()) return msgText('Valid 10 digit mobile number required','bad'); if(!$('pickup').value||!$('drop').value)return msgText('Pickup এবং Destination দিন','bad'); const j=await api('/api/qr/book',{method:'POST',body:JSON.stringify(body())}); token=j.token; guestRideToken=j.guest_ride_token||''; sessionStorage.setItem('nexo_qr_token',token); if(guestRideToken) sessionStorage.setItem('nexo_guest_ride_token',guestRideToken); lastRide=j.ride; const statusUrl=j.guest_status_url||('/guest-ride/?token='+encodeURIComponent(guestRideToken)); msg(`<span class="ok">Booking Confirmed</span><br><b>Ride ID:</b> ${esc(j.ride.id)}<br><b>Status:</b> ${esc(j.ride.status)}<br><b>Fare:</b> ₹${esc(j.ride.estimated_fare)}<br><b>Driver Requests:</b> ${esc(j.matching.candidate_count)}<br><a style="display:block;text-align:center;text-decoration:none;border-radius:16px;padding:14px;margin-top:12px;background:#69ffad;color:#00111a;font-weight:900" href="${esc(statusUrl)}">Open Live Ride Status</a><p class="muted">Driver accept → payment → OTP → live map → confirm reached → rating.</p>`)}catch(e){msg('<span class="bad">'+esc(e.message)+'</span>')}}
function logoutQr(){sessionStorage.removeItem('nexo_qr_token'); sessionStorage.removeItem('nexo_guest_ride_token'); token=''; guestRideToken=''; msgText('Saved QR session cleared.','ok')}
load();</script></body></html>
