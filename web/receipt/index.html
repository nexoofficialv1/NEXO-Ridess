<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Receipt</title><style>body{font-family:system-ui;background:#f4f7fb;margin:0;color:#0b1633}.box{max-width:760px;margin:20px auto;background:white;border-radius:18px;padding:22px;box-shadow:0 10px 30px #0002}.row{display:flex;justify-content:space-between;border-bottom:1px solid #e2e8f0;padding:10px 0}.muted{color:#64748b}input,button{padding:12px;border-radius:12px;border:1px solid #cbd5e1;margin:4px}button{background:#111c44;color:#fff;font-weight:800}.fare{font-size:28px;font-weight:900}.print{float:right}@media print{.no{display:none}.box{box-shadow:none;margin:0}}</style></head><body><div class="box"><button class="print no" onclick="print()">Print</button><h2>NEXO Ride Receipt</h2><div class="no"><input id="token" placeholder="Login token if registered ride"><input id="ride" placeholder="ride_id"><input id="guest" placeholder="guest token"><button onclick="loadReceipt()">Load</button></div><div id="out"><p class="muted">Enter ride_id with login token or guest token to view receipt.</p></div></div><script>
async function loadReceipt(){let h={'Authorization':'Bearer '+token.value.trim()};let url=guest.value.trim()?'/api/guest/rides/'+encodeURIComponent(guest.value.trim())+'/receipt':'/api/rides/'+encodeURIComponent(ride.value.trim())+'/receipt';let r=await fetch(url,{headers:h});let j=await r.json();if(!r.ok){out.innerHTML='<p>'+ (j.detail||r.status) +'</p>';return}let x=j.receipt;out.innerHTML=`<h3>${x.receipt_no}</h3><p class="muted">Ride: ${x.ride_id}</p><div class="row"><b>Passenger</b><span>${x.passenger_name} ${x.passenger_mobile||''}</span></div><div class="row"><b>Driver</b><span>${x.driver_name} ${x.vehicle_no||''}</span></div><div class="row"><b>Pickup</b><span>${x.pickup}</span></div><div class="row"><b>Drop</b><span>${x.drop}</span></div><div class="row"><b>Payment</b><span>${x.payment_status} ${x.payment_ref||''}</span></div><div class="row"><b>Completed</b><span>${x.completed_at||''}</span></div><p class="fare">Fare: ₹${Number(x.fare||0).toFixed(2)}</p><p class="muted">Generated: ${x.generated_at}</p>`}
const q=new URLSearchParams(location.search); if(q.get('ride_id')) ride.value=q.get('ride_id'); if(q.get('token')) guest.value=q.get('token');
</script></body></html>
