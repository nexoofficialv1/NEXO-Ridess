<!doctype html>
<html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride Live Status</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#071022;color:#fff}.wrap{max-width:660px;margin:auto;padding:18px}.card{background:#101a36;border:1px solid #23376e;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 10px 30px #0006}h1{font-size:25px;margin:8px 0}.muted{color:#aebbe8}.ok{color:#69ffad}.bad{color:#ff8585}.warn{color:#ffd36e}.fare{font-size:30px;font-weight:900;color:#69ffad}.pill{display:inline-block;padding:7px 10px;border-radius:999px;background:#1d2d55;margin:3px}button,a.btn{display:inline-block;text-align:center;text-decoration:none;border:0;border-radius:16px;padding:14px 16px;margin:7px 4px;background:#30e7ff;color:#00111a;font-weight:900;font-size:15px}.secondary{background:#22345f!important;color:#fff!important}.danger{background:#ff7070!important;color:#240000!important}input,select{width:100%;box-sizing:border-box;padding:14px;border-radius:14px;border:1px solid #324a88;background:#081229;color:#fff;font-size:16px}label{display:block;margin:12px 0 6px;font-weight:800}.timeline{border-left:2px solid #344d92;margin-left:8px;padding-left:14px}.timeline div{margin:9px 0}.small{font-size:13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{background:#081229;border-radius:15px;padding:12px}.mapline{height:10px;border-radius:99px;background:linear-gradient(90deg,#30e7ff,#69ffad);margin:10px 0}</style></head>
<body><div class="wrap"><h1>🚖 NEXO Ride Live Status</h1><p class="muted">Guest passenger: account ছাড়াই payment, OTP, live map, reached confirmation, receipt ও rating.</p>
<div class="card" id="status">Loading ride...</div>
<div class="card" id="actions"></div>
<div class="card"><b>Live Tracking / Google Map</b><div class="mapline"></div><div id="tracking" class="muted">Tracking loading...</div></div>
<div class="card"><b>Timeline</b><div id="timeline" class="timeline muted"></div></div>
</div><script>
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const params=new URLSearchParams(location.search); const token=params.get('token') || sessionStorage.getItem('nexo_guest_ride_token') || '';
let current=null, payment=null;
function setHtml(id,html){$(id).innerHTML=html}
async function api(path,opts={}){opts.headers={...(opts.headers||{}),'Content-Type':'application/json'}; const r=await fetch(path,opts); const j=await r.json().catch(()=>({detail:'Invalid response'})); if(!r.ok) throw new Error(j.detail||'Request failed'); return j;}
function statusLabel(s){return {REQUESTED:'Driver searching',DRIVER_ACCEPTED:'Driver found - payment pending',CONFIRMED:'Payment done - driver coming',ARRIVED:'Driver reached pickup - give OTP',STARTED:'Ride started',DRIVER_REACHED_DROP:'Driver reached drop - confirm reached',COMPLETED:'Completed',CANCELLED:'Cancelled',PAYMENT_TIMEOUT:'Payment timeout'}[String(s||'').toUpperCase()]||s;}
function payLeft(r){return r.payment_time_left_seconds?`<span class="warn">Payment time left: ${esc(r.payment_time_left_seconds)} sec</span>`:''}
function trackingHtml(r){const live=r.live_tracking||{}; const links=live.links||{}; const d=live.driver||{}; let html=`<div class="grid"><div class="box"><b>Driver GPS</b><br>${d.lat?esc(d.lat+', '+d.lng):'Waiting for driver GPS'}<br><span class="small">${esc(d.last_seen_at||live.note||'')}</span></div><div class="box"><b>Current route</b><br>${esc(statusLabel(r.status))}<br><span class="small">ETA approx ${esc(live.eta_minutes||'-')} min</span></div></div>`; if(links.active_route) html+=`<a class="btn" target="_blank" rel="noopener" href="${esc(links.active_route)}">Open Live Route</a>`; if(links.driver_to_pickup) html+=`<a class="btn secondary" target="_blank" rel="noopener" href="${esc(links.driver_to_pickup)}">Driver → Pickup</a>`; if(links.driver_to_drop) html+=`<a class="btn secondary" target="_blank" rel="noopener" href="${esc(links.driver_to_drop)}">Driver → Drop</a>`; if(links.pickup_to_drop) html+=`<a class="btn secondary" target="_blank" rel="noopener" href="${esc(links.pickup_to_drop)}">Pickup → Drop</a>`; return html;}
function render(j){current=j.ride; const r=current; if(!r){setHtml('status','<span class="bad">Ride not found</span>'); return;} sessionStorage.setItem('nexo_guest_ride_token',token);
 setHtml('status',`<div class="pill">${esc(statusLabel(r.status))}</div><h2>${esc(r.pickup)} → ${esc(r.drop)}</h2><div class="fare">₹${esc(r.estimated_fare||0)}</div><p class="muted">Ride ID: ${esc(r.id)}<br>Driver: ${esc(r.driver_name||'Searching')} ${r.driver_vehicle_no?'· '+esc(r.driver_vehicle_no):''} ${r.driver_mobile?'· '+esc(r.driver_mobile):''}<br>OTP: <b>${r.ride_otp?esc(r.ride_otp):'Payment complete হলে OTP আসবে'}</b><br>${payLeft(r)}</p>`);
 setHtml('tracking',trackingHtml(r));
 setHtml('timeline',(r.timeline||[]).map(t=>`<div><b>${esc(t.label)}</b><br><span class="small">${esc(t.at)}</span></div>`).join('')||'No events yet');
 let actions=`<button class="secondary" onclick="load()">Refresh Status</button>`;
 if(r.status==='DRIVER_ACCEPTED') actions+=`<button onclick="createPaymentOrder()">Create Payment Order</button><button onclick="payDemo()">Demo Payment Complete</button><label>UPI/Razorpay Ref</label><input id="payref" maxlength="80" placeholder="Payment reference"><button onclick="payReference()">Submit Payment Reference</button><p class="small muted">Production-এ Razorpay/UPI verification server-side হবে। Demo mode only testing.</p>`;
 if(r.status==='ARRIVED') actions+=`<p class="ok">Driver pickup point-এ এসেছে। এই OTP driver-কে দিন: <b>${esc(r.ride_otp||'')}</b></p>`;
 if(r.status==='DRIVER_REACHED_DROP') actions+=`<label>Rating</label><select id="rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><label>Comment</label><input id="comment" maxlength="200" placeholder="Optional"><button onclick="confirmReached()">Confirm Reached + Submit Rating</button>`;
 if(r.status==='COMPLETED') actions+=`<p class="ok">Ride completed. Receipt ready. Fare ₹${esc(r.estimated_fare||0)} · Ref ${esc(r.payment_ref||'')}</p>`;
 setHtml('actions',actions);
}
async function load(){try{if(!token) throw new Error('Ride token missing'); const j=await api('/api/guest/rides/'+encodeURIComponent(token)+'/live'); render(j);}catch(e){setHtml('status','<span class="bad">'+esc(e.message)+'</span>')}}
async function createPaymentOrder(){try{const j=await api('/api/guest/rides/'+encodeURIComponent(token)+'/payment-order',{method:'POST',body:'{}'}); payment=j.payment; alert('Payment order ready: '+(j.order?.id||'')); render({ride:j.ride});}catch(e){alert(e.message)}}
async function payDemo(){try{const j=await api('/api/guest/rides/'+encodeURIComponent(token)+'/payment-demo',{method:'POST',body:'{}'}); render({ride:j.ride});}catch(e){alert(e.message)}}
async function payReference(){try{const body={payment_ref:document.getElementById('payref')?.value||''}; const j=await api('/api/guest/rides/'+encodeURIComponent(token)+'/payment-reference',{method:'POST',body:JSON.stringify(body)}); render({ride:j.ride});}catch(e){alert(e.message)}}
async function confirmReached(){try{const body={rating:document.getElementById('rating')?.value||5, comment:document.getElementById('comment')?.value||''}; const j=await api('/api/guest/rides/'+encodeURIComponent(token)+'/confirm-reached',{method:'POST',body:JSON.stringify(body)}); render({ride:j.ride});}catch(e){alert(e.message)}}
load(); setInterval(load,8000);
</script></body></html>
