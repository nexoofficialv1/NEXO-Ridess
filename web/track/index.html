<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride Track</title><style>body{margin:0;font-family:system-ui;background:#06111f;color:#eef6ff}.wrap{max-width:880px;margin:auto;padding:18px}.card{background:#101d33;border:1px solid #263a5a;border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 12px 30px #0005}.status{font-size:24px;font-weight:900;color:#7df9ff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}button,a.btn{display:inline-block;border:0;border-radius:14px;padding:12px 14px;margin:5px;background:#00a884;color:white;text-decoration:none;font-weight:900}.danger{background:#dc3545}.warn{background:#fd7e14}.muted{color:#aab9d6}.small{font-size:13px}input,textarea{box-sizing:border-box;width:100%;padding:12px;border:0;border-radius:12px;background:#172843;color:#fff;margin:5px 0}</style></head><body><div class="wrap"><h1>🚖 NEXO Ride Live Track</h1><div id="app" class="card">Loading...</div></div><script>const token=decodeURIComponent((location.pathname.split('/track/')[1]||new URLSearchParams(location.search).get('token')||'').split('/')[0]); const $=id=>document.getElementById(id); let data=null; async function api(path,o={}){o.headers={...(o.headers||{}),'Content-Type':'application/json'}; const r=await fetch(path,o); const j=await r.json().catch(()=>({detail:'Bad response'})); if(!r.ok) throw new Error(j.detail||'API error'); return j;} function maps(){const l=data?.live?.links||{}; return [l.active_route&&`<a class="btn" target="_blank" href="${l.active_route}">Google Map Route</a>`, l.driver_to_pickup&&`<a class="btn" target="_blank" href="${l.driver_to_pickup}">Driver → Pickup</a>`, l.driver_to_drop&&`<a class="btn" target="_blank" href="${l.driver_to_drop}">Driver → Drop</a>`].filter(Boolean).join('');} async function load(){try{if(!token) throw new Error('Ride token missing'); data=await api('/api/track/'+encodeURIComponent(token)); const r=data.ride||{}, s=data.safety||{}, d=data.driver||{}; $('app').innerHTML=`<div class="status">${r.status||''}</div><div class="muted small">Updated: ${data.updated_at||''}</div><div class="card"><b>${r.pickup||''}</b><br>↓<br><b>${r.drop||''}</b></div><div class="grid"><div class="card"><div class="muted">Driver</div><b>${d.name||'Searching'}</b><br>${d.vehicle_no||''}<br>${d.mobile||''}</div><div class="card"><div class="muted">Fare</div><b>₹${r.estimated_fare||0}</b><br>${r.payment_status||''}</div><div class="card"><div class="muted">OTP</div><b>${r.ride_otp||'After payment'}</b><br>Verified: ${s.otp_verified?'Yes':'No'}</div></div><div class="card">${maps()||'<span class="muted">Map link will appear after location is available.</span>'}</div><button class="danger" onclick="sos()">SOS / Emergency</button><button onclick="share()">Share Trip</button><button class="warn" onclick="addContact()">Add Emergency Contact</button><div id="out" class="muted"></div>`;}catch(e){$('app').innerHTML='<b>'+e.message+'</b>';}} async function sos(){const reason=prompt('SOS reason','Need help during ride')||'SOS pressed'; const j=await api('/api/track/'+encodeURIComponent(token)+'/sos',{method:'POST',body:JSON.stringify({reason})}); alert('SOS sent to admin/support. Support: '+(j.event?.support_mobile||'')); load();} async function share(){const j=await api('/api/track/'+encodeURIComponent(token)+'/share',{method:'POST',body:JSON.stringify({})}); if(navigator.share){try{await navigator.share({title:'NEXO Ride Trip',text:j.share_text,url:j.share_url});}catch(e){}} document.getElementById('out').innerHTML='<textarea rows="5">'+j.share_text+'</textarea>'; } async function addContact(){const name=prompt('Emergency contact name')||''; const mobile=prompt('Emergency contact mobile')||''; if(!mobile) return; const j=await api('/api/track/'+encodeURIComponent(token)+'/emergency-contact',{method:'POST',body:JSON.stringify({name,mobile})}); alert('Emergency contact saved. Share link ready.'); document.getElementById('out').innerHTML='<textarea rows="5">'+j.share.share_text+'</textarea>';} load(); setInterval(load,8000);</script></body></html>
