<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride Version History</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#eef4ff;color:#10203f}.wrap{max-width:1100px;margin:auto;padding:24px}.hero{background:linear-gradient(135deg,#091b3a,#123f7a);color:white;border-radius:24px;padding:24px;box-shadow:0 14px 30px #0b1c3a22}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:18px}.card{background:white;border-radius:18px;padding:18px;box-shadow:0 8px 20px #1c3d7014}.badge{display:inline-block;padding:6px 10px;border-radius:99px;background:#e7f1ff;color:#063a77;font-weight:700;font-size:12px}.ok{color:#0a7b38}.bad{color:#b00020}.btn{display:inline-block;background:#0b5bd3;color:white;padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:800;margin:4px 6px 4px 0}.btn2{display:inline-block;background:white;color:#0b5bd3;border:1px solid #0b5bd3;padding:11px 15px;border-radius:12px;text-decoration:none;font-weight:800;margin:4px 6px 4px 0}pre{white-space:pre-wrap;background:#071733;color:#e8f1ff;border-radius:14px;padding:14px;overflow:auto}li{margin:7px 0}.small{font-size:13px;color:#5c6b82}</style></head><body><div class="wrap"><div class="hero"><span class="badge">Version History</span><h1>Server/APK Version History</h1><p>Current Sprint, APK version, cumulative build note এবং rollback target.</p><a class="btn" href="/api/admin/version-history">Admin API</a><a class="btn2" href="/rollback/">Rollback Guide</a></div><div class="card"><h3>Public Build Info</h3><pre id="out">Loading...</pre></div></div><script>fetch('/api/public/release-notes').then(r=>r.json()).then(j=>out.textContent=JSON.stringify({current:j.release_notes, pages:j.pages, latest_zip_rule:j.latest_zip_rule},null,2)).catch(e=>out.textContent=e.message)</script></body></html>
