<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b1f">
<title>NEXO Ride Admin Web</title>
<style>
:root{--bg:#070b1f;--card:#111a3c;--card2:#0c1432;--cyan:#6ff7ff;--violet:#8d5cff;--text:#eef4ff;--muted:#aebce6;--ok:#3cffb0;--warn:#ffcf5a;--bad:#ff6b7a}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans Bengali,sans-serif;background:radial-gradient(circle at top,#14245a 0,#070b1f 45%,#030615 100%);color:var(--text)}.wrap{max-width:1050px;margin:0 auto;padding:18px 14px 92px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px;border:1px solid rgba(111,247,255,.18);background:rgba(12,20,50,.82);border-radius:22px;box-shadow:0 16px 40px rgba(0,0,0,.35);position:sticky;top:8px;z-index:3;backdrop-filter:blur(10px)}.brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;color:#031027;font-weight:1000;font-size:30px;box-shadow:0 0 28px rgba(111,247,255,.35)}h1,h2,p{margin:0}.brand h1{font-size:20px}.brand p,.muted{color:var(--muted);font-size:13px}.chip{border:1px solid rgba(111,247,255,.25);background:#0b1535;color:var(--cyan);padding:9px 12px;border-radius:999px;font-weight:800}.card{margin-top:16px;background:linear-gradient(180deg,rgba(17,26,60,.96),rgba(8,13,33,.98));border:1px solid rgba(111,247,255,.16);border-radius:22px;padding:16px;box-shadow:0 16px 35px rgba(0,0,0,.28)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}.stat{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px}.stat b{font-size:24px;display:block;color:var(--cyan)}.stat span{color:var(--muted);font-size:12px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07);margin-top:10px}.row .left{display:flex;align-items:center;gap:12px;min-width:0}.ico{width:42px;height:42px;display:grid;place-items:center;border-radius:14px;background:#111e45}.row b{display:block}.row small{display:block;color:var(--muted);margin-top:3px}.btns{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:14px;padding:11px 14px;font-weight:900;cursor:pointer;color:#031027;background:linear-gradient(135deg,var(--cyan),#9cf);box-shadow:0 8px 20px rgba(111,247,255,.15)}button.secondary{background:#1a2756;color:var(--text);border:1px solid rgba(255,255,255,.12)}button.bad{background:linear-gradient(135deg,#ff6b7a,#ffc1c8)}input,select,textarea{width:100%;background:#080f28;color:var(--text);border:1px solid rgba(111,247,255,.22);border-radius:15px;padding:14px;margin-top:10px;font-size:16px}.login{max-width:430px;margin:48px auto}.alert{border:1px solid rgba(255,107,122,.35);background:rgba(255,107,122,.1);padding:12px;border-radius:14px;margin-top:12px;color:#ffd4da}.ok{border:1px solid rgba(60,255,176,.32);background:rgba(60,255,176,.09);padding:12px;border-radius:14px;margin-top:12px;color:#d2ffe9}.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(5,9,25,.94);backdrop-filter:blur(8px);display:flex;gap:8px;justify-content:center;padding:10px 8px;border-top:1px solid rgba(111,247,255,.14)}.tabs button{box-shadow:none;min-width:92px;background:#14204b;color:#cfe6ff}.tabs button.on{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#041027}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.top{align-items:flex-start}.chip{display:none}.row{align-items:flex-start;flex-direction:column}.row .left{width:100%}.btns{width:100%}.btns button{flex:1}.brand h1{font-size:18px}}


/* V46 Admin Mobile Responsive Fix: screenshot based mobile fit patch */
.quick-nav{display:none}.admin-mobile-badge{display:none}.top{isolation:isolate}.tabs{z-index:50}.tabs button{line-height:1.1}
@media(max-width:760px){
  html,body{min-width:0;overflow-x:hidden;-webkit-text-size-adjust:100%}
  .wrap{width:100%;max-width:100%;padding:10px 10px calc(122px + env(safe-area-inset-bottom));overflow-x:hidden}
  .top{position:relative;top:auto;z-index:2;border-radius:20px;padding:12px;align-items:center;box-shadow:0 10px 26px rgba(0,0,0,.28);backdrop-filter:blur(8px)}
  .brand{gap:10px;min-width:0;max-width:100%}.logo{width:44px;height:44px;border-radius:14px;font-size:24px;flex:0 0 auto}
  .brand h1{font-size:18px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px}.brand p{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px}
  .admin-mobile-badge{display:inline-flex;margin-top:4px;border:1px solid rgba(111,247,255,.2);color:var(--cyan);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800;background:rgba(111,247,255,.06)}
  .quick-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:25;margin-top:10px;padding:10px;border-radius:18px;border:1px solid rgba(111,247,255,.16);background:rgba(7,11,31,.94);backdrop-filter:blur(10px);box-shadow:0 8px 22px rgba(0,0,0,.24)}
  .quick-nav b{font-size:14px}.quick-nav small{display:block;color:var(--muted);font-size:11px}.quick-nav select{width:50%;min-width:145px;margin:0;padding:10px;border-radius:14px;font-size:14px}
  .card{margin-top:12px;border-radius:19px;padding:14px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{border-radius:16px;padding:12px;min-width:0}.stat b{font-size:23px}.stat span{font-size:12px}
  .row{border-radius:15px;padding:12px}.row small{font-size:12px}.btns button{min-height:42px}input,select,textarea{font-size:16px;padding:12px;border-radius:14px}.login{margin:22px auto}
  .tabs{left:0;right:0;bottom:0;justify-content:flex-start;overflow-x:auto;overflow-y:hidden;gap:8px;padding:8px 10px calc(10px + env(safe-area-inset-bottom));border-top:1px solid rgba(111,247,255,.18);scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;scrollbar-width:none;box-shadow:0 -10px 24px rgba(0,0,0,.35)}
  .tabs::-webkit-scrollbar{display:none}.tabs button{flex:0 0 auto;min-width:76px;max-width:112px;padding:10px 10px;border-radius:16px;font-size:13px;white-space:normal;scroll-snap-align:start;min-height:46px}.tabs button.on{box-shadow:0 0 18px rgba(111,247,255,.22)}
}
@media(max-width:390px){.wrap{padding-left:8px;padding-right:8px}.brand h1,.brand p{max-width:215px}.quick-nav{padding:9px}.quick-nav select{min-width:132px;width:48%}.tabs button{min-width:70px;font-size:12px;padding:9px 8px}.stat b{font-size:22px}}
@media(min-width:761px){.tabs{padding-bottom:10px}}


/* Sprint-5G standalone admin contrast final */
:root{--bg:#F3F8FF!important;--card:#FFFFFF!important;--card2:#FFFFFF!important;--cyan:#0B74DE!important;--violet:#07539E!important;--text:#111827!important;--muted:#475467!important;--ok:#16A34A!important;--warn:#F59E0B!important;--bad:#DC2626!important}
body{background:linear-gradient(180deg,#eef6ff 0%,#f8fbff 56%,#ffffff 100%)!important;color:#111827!important}
.top{background:linear-gradient(135deg,#0B74DE,#07539E)!important;color:#fff!important;border:0!important}.top *{color:#fff!important}.logo{background:#fff!important;color:#0B74DE!important}.chip{background:#EAF5FF!important;color:#07539E!important;border-color:#CFE8FF!important}
.card,.row,.stat{background:#fff!important;color:#111827!important;border:1px solid #D9E7F5!important;box-shadow:0 10px 26px rgba(16,24,40,.06)!important}h1,h2,b,.row b,.stat b{color:#111827!important}.top h1,.top b,.top p{color:#fff!important}.muted,.row small,.stat span,p{color:#475467!important}.ico{background:#EAF5FF!important;color:#0B74DE!important}input,select,textarea{background:#fff!important;color:#111827!important;border-color:#D9E7F5!important}.tabs{background:#fff!important;border-color:#D9E7F5!important}.tabs button{background:#EAF5FF!important;color:#07539E!important}.tabs button.on,button{background:linear-gradient(135deg,#0B74DE,#07539E)!important;color:#fff!important}.secondary,button.secondary{background:#EAF5FF!important;color:#07539E!important;border:1px solid #CFE8FF!important}

</style>

<body>
<div class="wrap"><div id="root"></div></div>
<script>
const API='/api'; const TOKEN_KEY='nexoRideAdminTokenStandalone'; let token=localStorage.getItem(TOKEN_KEY)||''; let tab='dashboard';
const $=s=>document.querySelector(s); function esc(x){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function api(path,opts={}){const r=await fetch(API+path,{method:opts.method||'GET',headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})},body:opts.body?JSON.stringify(opts.body):undefined});let d={};try{d=await r.json()}catch(e){}if(!r.ok)throw new Error(d.detail||'Server error');return d}
const ADMIN_TABS=[['dashboard','Dashboard'],['security','Security'],['monitor','Monitor'],['operations','Operations'],['auth','Auth'],['legal','Legal'],['storage','Storage'],['drivers','Drivers'],['kyc','KYC'],['payments','Payout'],['gateway','Gateway'],['maps','Maps'],['build','Build'],['deploy','Deploy'],['launch','Launch'],['subadmins','Sub Admin'],['live','Live'],['push','Push'],['notifications','Notify'],['control','Control'],['support','Support'],['data','Database']];
function setTab(next){tab=next;render()}
function layout(body){
  const options=ADMIN_TABS.map(([id,label])=>`<option value="${id}" ${tab===id?'selected':''}>${label}</option>`).join('');
  const buttons=ADMIN_TABS.map(([id,label])=>`<button class="${tab===id?'on':''}" onclick="setTab('${id}')">${label}</button>`).join('');
  $('#root').innerHTML=`<header class="top"><div class="brand"><div class="logo">N</div><div><h1>NEXO Ride Admin Web</h1><p>Astra Technologies · Kalna Sub-Division</p><span class="admin-mobile-badge">Mobile fit V50</span></div></div><span class="chip">ADMIN PANEL</span></header><section class="quick-nav"><div><b>Admin Section</b><small>Mobile selector · bottom bar swipeable</small></div><select onchange="setTab(this.value)">${options}</select></section>${body}<nav class="tabs" aria-label="Admin sections">${buttons}<button onclick="logout()">Logout</button></nav>`
}
function loginView(msg=''){$('#root').innerHTML=`<section class="card login"><div class="brand"><div class="logo">N</div><div><h1>Admin Login</h1><p>Passenger/Driver APK থেকে আলাদা web app</p></div></div>${msg?`<div class="alert">${esc(msg)}</div>`:''}<input id="login" placeholder="Admin email/mobile" value=""><input id="password" type="password" placeholder="Password" value=""><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="consent" type="checkbox" style="width:auto;margin:0"> Admin data access responsibility মানছি</label><button style="width:100%;margin-top:14px" onclick="login()">Admin Login</button><p class="muted" style="margin-top:14px">URL: /admin/ · Health: /api/health</p></section>`}
async function login(){try{if(!$('#consent').checked)return alert('Consent tick করুন');const d=await api('/auth/login',{method:'POST',body:{login:$('#login').value.trim(),password:$('#password').value}});token=d.token;localStorage.setItem(TOKEN_KEY,token);await render()}catch(e){loginView(e.message)}}
function logout(){localStorage.removeItem(TOKEN_KEY);token='';loginView()}
async function render(){if(!token)return loginView();try{await api('/me'); if(tab==='security')return securityCenter(); if(tab==='monitor')return monitorCenter(); if(tab==='auth')return authCenter(); if(tab==='legal')return legalCenter(); if(tab==='storage')return storageCenter(); if(tab==='operations')return operationsCenter(); if(tab==='drivers')return drivers(); if(tab==='kyc')return kyc(); if(tab==='payments')return payments(); if(tab==='gateway')return paymentGateway(); if(tab==='maps')return mapCenter(); if(tab==='build')return buildCenter(); if(tab==='deploy')return deployCenter(); if(tab==='subadmins')return subadmins(); if(tab==='live')return live(); if(tab==='push')return pushCenter(); if(tab==='notifications')return notifications(); if(tab==='control')return controlCenter(); if(tab==='support')return supportCenter(); if(tab==='data')return databaseCenter(); if(tab==='launch')return launchCenter(); return dashboard()}catch(e){return loginView(e.message)}}

async function launchCenter(){try{const d=await api('/admin/launch-readiness');const l=d.launch||{};const s=l.summary||{};const counts=l.current_counts||{};function rows(arr){return (arr||[]).map(c=>`<div class="row"><div class="left"><div class="ico">${c.ok?'✅':'⚠️'}</div><div><b>${esc(c.title)}</b><small>${esc(c.detail||'')}</small></div></div><b>${c.ok?'READY':'PENDING'}</b></div>`).join('')||'<div class="alert">No checklist</div>'}layout(`<section class="card"><h2>Launch Readiness + Field Test Center</h2><p class="muted">Final public launch-এর আগে production dependency এবং real field-test readiness check.</p><div class="grid"><div class="stat"><b>${s.ready||0}/${s.total||0}</b><span>Total Ready</span></div><div class="stat"><b>${s.core_ready?'YES':'NO'}</b><span>Core Flow</span></div><div class="stat"><b>${s.production_ready?'YES':'NO'}</b><span>Production</span></div><div class="stat"><b>${s.pilot_ready?'YES':'NO'}</b><span>Field Pilot</span></div><div class="stat"><b>${counts.approved_drivers||0}</b><span>Approved Drivers</span></div><div class="stat"><b>${counts.passengers||0}</b><span>Passengers</span></div><div class="stat"><b>${counts.completed_rides||0}</b><span>Completed Test Rides</span></div><div class="stat"><b>${counts.sub_admins||0}</b><span>Sub Admins</span></div></div>${s.launch_ready?'<div class="ok">Launch readiness OK. Final legal/payment/server verification করে release করুন।</div>':'<div class="alert">Launch blockers আছে। নিচের pending items আগে clear করুন।</div>'}</section><section class="card"><h2>Core App Checks</h2>${rows(l.core_checks)}</section><section class="card"><h2>Production Dependency Checks</h2>${rows(l.production_checks)}</section><section class="card"><h2>Field Pilot Checks</h2>${rows(l.pilot_checks)}</section><section class="card"><h2>Next Launch Steps</h2>${(l.launch_steps||[]).map((x,i)=>`<div class="row"><div class="left"><div class="ico">${i+1}</div><div><b>${esc(x)}</b><small>Launch action item</small></div></div></div>`).join('')}</section><section class="card"><h2>Current Blockers</h2>${(l.blockers||[]).map(b=>`<div class="row"><div class="left"><div class="ico">⛔</div><div><b>${esc(b.title)}</b><small>${esc(b.detail)}</small></div></div></div>`).join('')||'<div class="ok">No blocker detected</div>'}</section>`)}catch(e){layout(`<section class="card"><div class="alert">${esc(e.message)}</div></section>`)}}


async function securityCenter(){try{const d=await api('/admin/security-status');const sec=d.security||{};const s=sec.summary||{};const set=sec.settings||{};const checks=(sec.checks||[]).map(c=>`<div class="row"><div class="left"><div class="ico">${c.ok?'✅':'⚠️'}</div><div><b>${esc(c.title)}</b><small>${esc(c.detail||'')}</small></div></div><b>${c.ok?'OK':'CHECK'}</b></div>`).join('');const blockers=(sec.blockers||[]).map(b=>`<div class="row"><div class="left"><div class="ico">⛔</div><div><b>${esc(b.title)}</b><small>${esc(b.detail||'')}</small></div></div></div>`).join('')||'<div class="ok">No major security blocker detected.</div>';const admins=(sec.admins||[]).map(a=>`<div class="row"><div class="left"><div class="ico">🛡️</div><div><b>${esc(a.name||'Admin')} · ${esc(a.status||'')}</b><small>${esc(a.email||'')} · ${esc(a.mobile||'')} · Password change: ${a.must_change_password?'Required':'No'} · Last login: ${esc((a.last_login_at||'').slice(0,19)||'Never')}</small></div></div></div>`).join('')||'<div class="alert">No admin user found.</div>';const events=(sec.recent_security_events||[]).map(e=>`<div class="row"><div class="left"><div class="ico">🧾</div><div><b>${esc(e.event_type||'SECURITY')}</b><small>${esc((e.at||'').slice(0,19))} · ${esc(e.user_id||'system')}</small></div></div></div>`).join('')||'<div class="alert">No security event yet.</div>';layout(`<section class="card"><h2>Security Hardening + Admin Access Center</h2><p class="muted">Admin login, default password risk, rate limit, lockout, HTTPS/secrets, audit এবং session control এক জায়গায়।</p><div class="grid"><div class="stat"><b>${s.score||0}%</b><span>Security Score</span></div><div class="stat"><b>${s.ready?'YES':'NO'}</b><span>Security Ready</span></div><div class="stat"><b>${s.admins||0}</b><span>Admin Users</span></div><div class="stat"><b>${s.admin_sessions||0}</b><span>Admin Sessions</span></div><div class="stat"><b>${s.default_password_detected?'YES':'NO'}</b><span>Default Password Risk</span></div><div class="stat"><b>${s.https_ready?'YES':'NO'}</b><span>HTTPS</span></div><div class="stat"><b>${s.env_secret_ready?'YES':'NO'}</b><span>App Secret</span></div><div class="stat"><b>${s.db_ready?'YES':'NO'}</b><span>PostgreSQL</span></div></div>${s.default_password_detected?'<div class="alert">Warning: legacy weak default password launch-এর আগে অবশ্যই change করতে হবে।</div>':'<div class="ok">Default admin password risk detected হয়নি।</div>'}</section><section class="card"><h2>Security Settings</h2><input id="sec_minpass" type="number" placeholder="Minimum password length" value="${esc(set.min_password_length||8)}"><input id="sec_rate" type="number" placeholder="Login rate limit / minute" value="${esc(set.login_rate_limit_per_minute||8)}"><input id="sec_fail" type="number" placeholder="Max failed attempts" value="${esc(set.max_failed_login_attempts||5)}"><input id="sec_lock" type="number" placeholder="Lockout minutes" value="${esc(set.lockout_minutes||15)}"><input id="sec_admin_days" type="number" placeholder="Admin session days" value="${esc(set.admin_session_days||7)}"><textarea id="sec_ips" placeholder="IP allowlist, one per line">${esc((set.ip_allowlist||[]).join('\n'))}</textarea><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_2fa" type="checkbox" style="width:auto;margin:0" ${set.enforce_admin_2fa?'checked':''}> Admin 2FA/OTP required</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_default" type="checkbox" style="width:auto;margin:0" ${set.force_password_change_on_default?'checked':''}> Force password change on default password</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_ratelimit" type="checkbox" style="width:auto;margin:0" ${set.login_rate_limit_enabled?'checked':''}> Login rate limit enabled</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_lockout" type="checkbox" style="width:auto;margin:0" ${set.account_lockout_enabled?'checked':''}> Account lockout enabled</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_audit" type="checkbox" style="width:auto;margin:0" ${set.audit_sensitive_actions?'checked':''}> Sensitive action audit</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_mask" type="checkbox" style="width:auto;margin:0" ${set.mask_personal_data_in_logs?'checked':''}> Mask personal data in logs</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_https" type="checkbox" style="width:auto;margin:0" ${set.production_https_required?'checked':''}> Production HTTPS required</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_secret" type="checkbox" style="width:auto;margin:0" ${set.environment_secrets_required?'checked':''}> Environment secrets required</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="sec_ip_on" type="checkbox" style="width:auto;margin:0" ${set.ip_allowlist_enabled?'checked':''}> IP allowlist enabled</label><textarea id="sec_note" placeholder="Security note">${esc(set.note||'')}</textarea><div class="btns" style="margin-top:12px"><button onclick="saveSecuritySettings()">Save Security Settings</button><button class="secondary" onclick="rotateAdminKey()">Generate Recovery Code</button><button class="bad" onclick="forceLogoutSessions()">Force Logout Other Sessions</button></div></section><section class="card"><h2>Security Checklist</h2>${checks}</section><section class="card"><h2>Current Security Blockers</h2>${blockers}</section><section class="card"><h2>Admin Access List</h2>${admins}</section><section class="card"><h2>Recent Security Events</h2>${events}</section>`)}catch(e){layout(`<section class="card"><div class="alert">${esc(e.message)}</div></section>`)}}
async function saveSecuritySettings(){try{await api('/admin/security-settings',{method:'POST',body:{min_password_length:Number($('#sec_minpass').value||8),login_rate_limit_per_minute:Number($('#sec_rate').value||8),max_failed_login_attempts:Number($('#sec_fail').value||5),lockout_minutes:Number($('#sec_lock').value||15),admin_session_days:Number($('#sec_admin_days').value||7),ip_allowlist:$('#sec_ips').value,enforce_admin_2fa:$('#sec_2fa').checked,force_password_change_on_default:$('#sec_default').checked,login_rate_limit_enabled:$('#sec_ratelimit').checked,account_lockout_enabled:$('#sec_lockout').checked,audit_sensitive_actions:$('#sec_audit').checked,mask_personal_data_in_logs:$('#sec_mask').checked,production_https_required:$('#sec_https').checked,environment_secrets_required:$('#sec_secret').checked,ip_allowlist_enabled:$('#sec_ip_on').checked,note:$('#sec_note').value}});alert('Security settings saved');securityCenter()}catch(e){alert(e.message)}}
async function forceLogoutSessions(){if(!confirm('Other sessions logout হবে। Continue?'))return;try{const d=await api('/admin/security/force-logout',{method:'POST',body:{}});alert('Removed sessions: '+d.removed);securityCenter()}catch(e){alert(e.message)}}
async function rotateAdminKey(){try{const d=await api('/admin/security/rotate-admin-key',{method:'POST',body:{}});alert('Recovery Code: '+d.recovery_code+'\nএই code একবারই দেখানো হচ্ছে।');securityCenter()}catch(e){alert(e.message)}}

async function migrationSnapshot(){try{await api('/admin/database/snapshot',{method:'POST',body:{}});alert('Migration dry-run snapshot saved');databaseCenter()}catch(e){alert(e.message)}}
async function downloadSchema(){try{const r=await fetch(API+'/admin/database/schema.sql',{headers:{Authorization:'Bearer '+token}});if(!r.ok)throw new Error('Schema download failed');const blob=await r.blob();const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='POSTGRESQL_PRODUCTION_SCHEMA_NOTE.sql';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}catch(e){alert(e.message)}}


async function authCenter(){try{const d=await api('/admin/auth-status');const a=d.auth||{};const s=a.summary||{};const set=a.settings||{};const checks=(a.checks||[]).map(c=>`<div class="row"><div class="left"><div class="ico">${c.ok?'✅':'⚠️'}</div><div><b>${esc(c.title)}</b><small>${esc(c.detail||'')}</small></div></div><b>${c.ok?'READY':'PENDING'}</b></div>`).join('');const recent=(a.recent_otp||[]).slice(0,40).map(o=>`<div class="row"><div class="left"><div class="ico">${o.status==='VERIFIED'?'✅':(o.status==='EXPIRED'?'⌛':'🔐')}</div><div><b>${esc(o.mobile_masked)} · ${esc(o.purpose||'LOGIN')}</b><small>${esc(o.provider)} · ${esc(o.status)} · ${String(o.created_at||'').slice(0,19)} → ${String(o.expires_at||'').slice(0,19)}</small></div></div></div>`).join('')||'<div class="alert">No OTP requests yet.</div>';layout(`<section class="card"><h2>OTP Authentication + Session Center</h2><p class="muted">Real OTP provider, session lifetime, demo OTP warning, consent requirement এবং active session monitoring.</p><div class="grid"><div class="stat"><b>${esc(set.otp_provider||'DEMO')}</b><span>OTP Provider</span></div><div class="stat"><b>${s.active_sessions||0}</b><span>Active Sessions</span></div><div class="stat"><b>${s.otp_requests||0}</b><span>OTP Requests</span></div><div class="stat"><b>${s.production_ready?'YES':'NO'}</b><span>Auth Ready</span></div><div class="stat"><b>${esc(set.otp_expiry_minutes||5)}m</b><span>OTP Expiry</span></div><div class="stat"><b>${esc(set.session_days||30)}d</b><span>Session</span></div><div class="stat"><b>${s.otp_verified||0}</b><span>Verified OTP</span></div><div class="stat"><b>${s.expired_sessions||0}</b><span>Expired Sessions</span></div></div>${set.otp_provider==='DEMO'?'<div class="alert">বর্তমানে DEMO OTP চলছে। Public launch-এর আগে real Firebase/MSG91/2Factor OTP configure করুন।</div>':'<div class="ok">Real OTP provider selected. SMS key/webhook final check করুন।</div>'}</section><section class="card"><h2>Auth Settings</h2><select id="auth_provider"><option ${set.otp_provider==='DEMO'?'selected':''}>DEMO</option><option ${set.otp_provider==='FIREBASE'?'selected':''}>FIREBASE</option><option ${set.otp_provider==='MSG91'?'selected':''}>MSG91</option><option ${set.otp_provider==='TWOFACTOR'?'selected':''}>TWOFACTOR</option></select><input id="auth_demo" placeholder="Demo OTP" value="${esc(set.demo_otp||'123456')}"><input id="auth_exp" type="number" placeholder="OTP expiry minutes" value="${esc(set.otp_expiry_minutes||5)}"><input id="auth_cool" type="number" placeholder="Resend cooldown seconds" value="${esc(set.resend_cooldown_seconds||60)}"><input id="auth_limit" type="number" placeholder="Max OTP / mobile / hour" value="${esc(set.max_otp_per_mobile_per_hour||5)}"><input id="auth_session" type="number" placeholder="Session days" value="${esc(set.session_days||30)}"><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="auth_roll" type="checkbox" style="width:auto;margin:0" ${set.rolling_session_enabled?'checked':''}> Rolling 30-day session renew</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="auth_consent" type="checkbox" style="width:auto;margin:0" ${set.consent_required?'checked':''}> Consent mandatory</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="auth_prod" type="checkbox" style="width:auto;margin:0" ${set.production_sms_ready?'checked':''}> Production SMS gateway ready</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="auth_fb" type="checkbox" style="width:auto;margin:0" ${set.firebase_ready?'checked':''}> Firebase ready</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="auth_msg91" type="checkbox" style="width:auto;margin:0" ${set.msg91_ready?'checked':''}> MSG91 ready</label><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="auth_2f" type="checkbox" style="width:auto;margin:0" ${set.twofactor_ready?'checked':''}> 2Factor ready</label><textarea id="auth_note" placeholder="Auth note">${esc(set.note||'')}</textarea><div class="btns" style="margin-top:12px"><button onclick="saveAuthSettings()">Save Auth Settings</button><button class="secondary" onclick="cleanupSessions()">Clean Expired Sessions</button></div></section><section class="card"><h2>Authentication Checklist</h2>${checks}</section><section class="card"><h2>Recent OTP Logs</h2>${recent}</section>`)}catch(e){layout(`<section class="card"><div class="alert">${esc(e.message)}</div></section>`)}}
async function saveAuthSettings(){try{await api('/admin/auth-settings',{method:'POST',body:{otp_provider:$('#auth_provider').value,demo_otp:$('#auth_demo').value,otp_expiry_minutes:Number($('#auth_exp').value||5),resend_cooldown_seconds:Number($('#auth_cool').value||60),max_otp_per_mobile_per_hour:Number($('#auth_limit').value||5),session_days:Number($('#auth_session').value||30),rolling_session_enabled:$('#auth_roll').checked,consent_required:$('#auth_consent').checked,production_sms_ready:$('#auth_prod').checked,firebase_ready:$('#auth_fb').checked,msg91_ready:$('#auth_msg91').checked,twofactor_ready:$('#auth_2f').checked,note:$('#auth_note').value}});alert('Auth settings saved');authCenter()}catch(e){alert(e.message)}}
async function cleanupSessions(){try{const d=await api('/admin/auth/cleanup-sessions',{method:'POST',body:{}});alert('Expired sessions removed: '+d.removed);authCenter()}catch(e){alert(e.message)}}

render();
</script>

<script>
// v1.0.50 V51 - Admin KYC review visibility fix overrides
function docBox(data,label){
  if(!data)return `<div class="muted" style="border:1px dashed rgba(255,255,255,.18);border-radius:12px;padding:10px;text-align:center">${label}<br>Missing</div>`;
  const s=String(data);
  if(s.startsWith('data:image') || s.startsWith('/api/files/'))return `<a href="${esc(s)}" target="_blank"><img src="${esc(s)}" alt="${label}" style="width:100%;height:92px;object-fit:cover;border-radius:12px;border:1px solid rgba(111,247,255,.2)"><small style="display:block;text-align:center;margin-top:4px">${label} · Open</small></a>`;
  return `<div class="muted" style="border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:10px;text-align:center">${label}<br>${esc(s.slice(0,28))}</div>`;
}
async function kyc(){
  try{
    const d=await api('/admin/driver-kyc');
    const s=d.summary||{};
    const rows=(d.drivers||[]).map(x=>{
      const incomplete=x.review_status==='SUBMITTED_BUT_INCOMPLETE';
      const ready=x.review_status==='UNDER_ADMIN_REVIEW'||x.complete;
      const badge=x.kyc_status==='VERIFIED'?'✅ Verified':x.kyc_status==='REJECTED'?'❌ Rejected':ready?'🟢 Under Review':incomplete?'🟡 Submitted Incomplete':'⚪ Not Submitted';
      const missing=(x.missing||[]).length?`<small style="color:#ffd166">Missing: ${esc((x.missing||[]).join(', '))}</small>`:'';
      return `<div class="row"><div class="left"><div class="ico">🪪</div><div><b>${esc(x.name)} · ${esc(x.vehicle_no||'No Toto No')}</b><small>${esc(x.mobile)} · Area ${esc(x.area||'Kalna')} · ${badge} · ${x.docs_present}/${x.docs_required} docs</small><small>Submitted: ${x.kyc_submitted_at?esc(String(x.kyc_submitted_at).slice(0,19)):'Not yet'}</small>${missing}</div></div><div class="btns">${x.kyc_status==='VERIFIED'?'<button class="secondary">Verified</button>':`<button ${!x.complete?'class="secondary" title="Incomplete documents"':''} onclick="kycAct('${x.profile_id}','verify')">Verify & Approve</button><button class="bad" onclick="kycAct('${x.profile_id}','reject')">Reject</button>`}</div><div style="width:100%;margin-top:10px;display:grid;grid-template-columns:repeat(4,minmax(70px,1fr));gap:8px">${docBox(x.driver_photo,'Driver')}${docBox(x.vehicle_photo,'Vehicle')}${docBox(x.aadhaar_doc,'Aadhaar')}${docBox(x.license_doc,'Licence')}</div></div>`;
    }).join('')||'<div class="alert">No KYC submission yet</div>';
    const recent=(d.submissions||[]).slice(0,8).map(x=>`<div class="row"><div class="left"><div class="ico">📨</div><div><b>${esc(x.driver_name||x.driver_user_id||'Driver')}</b><small>${esc(x.mobile||'')} · ${esc(x.status||'')} · ${x.docs_present}/${x.docs_required} · ${esc(String(x.submitted_at||'').slice(0,19))}</small><small>${esc(x.message||'')}</small></div></div></div>`).join('')||'<div class="muted">No recent submission log</div>';
    layout(`<section class="card"><h2>Driver KYC Verification</h2><p class="muted">Driver submit করলে এখানে সঙ্গে সঙ্গে Under Review দেখাবে। Missing থাকলে warning দেখাবে; complete হলে Verify & Approve করুন।</p><div class="grid"><div class="stat"><b>${s.total||0}</b><span>Total</span></div><div class="stat"><b>${s.submitted||0}</b><span>Submitted</span></div><div class="stat"><b>${s.under_review||0}</b><span>Under Review</span></div><div class="stat"><b>${s.submitted_incomplete||0}</b><span>Incomplete</span></div><div class="stat"><b>${s.verified||0}</b><span>Verified</span></div><div class="stat"><b>${s.rejected||0}</b><span>Rejected</span></div></div><button style="width:100%;margin-top:12px" onclick="kyc()">Refresh KYC Queue</button></section><section class="card"><h2>KYC Queue</h2>${rows}</section><section class="card"><h2>Recent Submission Log</h2>${recent}</section>`)
  }catch(e){layout(`<section class="card"><div class="alert">${esc(e.message)}</div></section>`)}
}
</script>
</body>
</html>
