<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b1f">
<title>NEXO Ride Sub Admin</title>
<style>
:root{--bg:#070b1f;--card:#101a3d;--card2:#0b1230;--cyan:#6ff7ff;--violet:#8d5cff;--text:#eef4ff;--muted:#aebce6;--ok:#3cffb0;--warn:#ffcf5a;--bad:#ff6b7a}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans Bengali,sans-serif;background:radial-gradient(circle at top,#16275f 0,#070b1f 45%,#030615 100%);color:var(--text)}.wrap{max-width:980px;margin:0 auto;padding:14px 12px 88px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;position:sticky;top:8px;z-index:4;background:rgba(9,15,39,.9);backdrop-filter:blur(10px);border:1px solid rgba(111,247,255,.17);border-radius:22px;padding:14px;box-shadow:0 12px 36px rgba(0,0,0,.34)}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--cyan),var(--violet));color:#031027;font-weight:1000;font-size:28px;box-shadow:0 0 28px rgba(111,247,255,.32)}h1,h2,p{margin:0}.brand h1{font-size:19px}.muted,.brand p,small{color:var(--muted)}.chip{border:1px solid rgba(111,247,255,.24);color:var(--cyan);padding:8px 11px;border-radius:999px;font-weight:900}.card{margin-top:14px;border:1px solid rgba(111,247,255,.15);border-radius:22px;padding:15px;background:linear-gradient(180deg,rgba(17,26,60,.95),rgba(8,13,33,.98));box-shadow:0 14px 34px rgba(0,0,0,.25)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.stat{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:17px;padding:13px}.stat b{display:block;font-size:23px;color:var(--cyan)}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:10px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.045);border-radius:16px;padding:12px}.left{display:flex;align-items:center;gap:11px;min-width:0}.ico{width:40px;height:40px;border-radius:14px;background:#111e45;display:grid;place-items:center}.row b{display:block}.btns{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:14px;padding:11px 13px;background:linear-gradient(135deg,var(--cyan),#9cf);color:#031027;font-weight:950;cursor:pointer}button.secondary{background:#1a2756;color:#fff;border:1px solid rgba(255,255,255,.13)}button.bad{background:linear-gradient(135deg,#ff6b7a,#ffc1c8)}input,select{width:100%;background:#080f28;color:var(--text);border:1px solid rgba(111,247,255,.22);border-radius:15px;padding:13px;margin-top:10px;font-size:16px}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.login{max-width:430px;margin:46px auto}.alert{border:1px solid rgba(255,107,122,.32);background:rgba(255,107,122,.09);padding:12px;border-radius:14px;margin-top:12px;color:#ffdbe0}.ok{border:1px solid rgba(60,255,176,.28);background:rgba(60,255,176,.08);padding:12px;border-radius:14px;margin-top:12px;color:#d7ffed}.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(5,9,25,.96);backdrop-filter:blur(8px);display:flex;gap:7px;justify-content:center;padding:9px 8px;border-top:1px solid rgba(111,247,255,.14)}.tabs button{box-shadow:none;min-width:78px;background:#14204b;color:#cfe6ff}.tabs button.on{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#041027}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.formGrid{grid-template-columns:1fr}.row{align-items:flex-start;flex-direction:column}.btns{width:100%}.btns button{flex:1}.chip{display:none}.brand h1{font-size:17px}}
</style>
</head>
<body><div class="wrap"><div id="root"></div></div>
<script>
const API='/api'; const TOKEN_KEY='nexoRideSubAdminTokenV26'; let token=localStorage.getItem(TOKEN_KEY)||''; let tab='home'; let me=null;
const $=s=>document.querySelector(s); const esc=x=>String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function api(path,opts={}){const r=await fetch(API+path,{method:opts.method||'GET',headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})},body:opts.body?JSON.stringify(opts.body):undefined});let d={};try{d=await r.json()}catch(e){}if(!r.ok)throw new Error(d.detail||'Server error');return d}
function layout(body){document.getElementById('root').innerHTML=`<header class="top"><div class="brand"><div class="logo">N</div><div><h1>NEXO Ride Sub Admin</h1><p>${esc(me?.user?.area||'Area Panel')} · by Astra Technologies</p></div></div><span class="chip">AREA MANAGER</span></header>${body}<nav class="tabs"><button class="${tab==='home'?'on':''}" onclick="tab='home';render()">Home</button><button class="${tab==='add'?'on':''}" onclick="tab='add';render()">Add</button><button class="${tab==='drivers'?'on':''}" onclick="tab='drivers';render()">Drivers</button><button class="${tab==='earnings'?'on':''}" onclick="tab='earnings';render()">Earning</button><button class="${tab==='live'?'on':''}" onclick="tab='live';render()">Live</button><button onclick="logout()">Logout</button></nav>`}
function loginView(msg=''){document.getElementById('root').innerHTML=`<section class="card login"><div class="brand"><div class="logo">N</div><div><h1>Sub Admin Login</h1><p>নিজের এলাকার Toto Driver/Passenger manage করুন</p></div></div>${msg?`<div class="alert">${esc(msg)}</div>`:''}<input id="login" placeholder="Mobile / Email"><input id="password" type="password" placeholder="Password"><label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="consent" type="checkbox" style="width:auto;margin:0"> Area data responsibility ও platform rules মানছি</label><button style="width:100%;margin-top:14px" onclick="login()">Sub Admin Login</button><p class="muted" style="margin-top:14px">Main Admin প্রথমে Sub Admin তৈরি করবে। URL: /subadmin/</p></section>`}
async function login(){try{if(!$('#consent').checked)return alert('Consent tick করুন');const d=await api('/auth/login',{method:'POST',body:{login:$('#login').value.trim(),password:$('#password').value}});if(d.user.role!=='SUB_ADMIN' && d.user.role!=='ADMIN' && d.user.role!=='SUPER_ADMIN')throw new Error('Only Sub Admin/Admin can use this panel');token=d.token;localStorage.setItem(TOKEN_KEY,token);await render()}catch(e){loginView(e.message)}}
function logout(){localStorage.removeItem(TOKEN_KEY);token='';me=null;loginView()}
async function render(){if(!token)return loginView();try{me=await api('/me'); if(!['SUB_ADMIN','ADMIN','SUPER_ADMIN'].includes(me.user.role)) throw new Error('Sub Admin access only'); if(tab==='add')return addPage(); if(tab==='drivers')return driversPage(); if(tab==='earnings')return earningsPage(); if(tab==='live')return livePage(); return homePage()}catch(e){localStorage.removeItem(TOKEN_KEY);token='';loginView(e.message)}}
async function homePage(){const s=await api('/admin/summary');let users={users:[]};try{users=await api('/subadmin/users')}catch(e){}let cms={summary:{}};try{cms=await api('/admin/subadmin-commissions')}catch(e){}const x=s.summary;layout(`<section class="card"><h2>Area Dashboard</h2><p class="muted">আপনার এলাকার driver/passenger/commission summary</p><div class="grid"><div class="stat"><b>${x.users||0}</b><span>Managed Users</span></div><div class="stat"><b>${x.drivers||0}</b><span>Drivers</span></div><div class="stat"><b>${x.online_drivers||0}</b><span>Online</span></div><div class="stat"><b>${x.completed||0}</b><span>Completed Rides</span></div><div class="stat"><b>₹${x.platform_commission||0}</b><span>Platform Commission</span></div><div class="stat"><b>₹${cms.summary.pending_amount||0}</b><span>My Pending Share</span></div><div class="stat"><b>₹${cms.summary.paid_amount||0}</b><span>Paid Share</span></div><div class="stat"><b>${x.safety_open||0}</b><span>SOS Open</span></div></div></section><section class="card"><h2>Recent Managed Users</h2>${(users.users||[]).slice(0,8).map(u=>`<div class="row"><div class="left"><div class="ico">${u.role==='DRIVER'?'🛺':'👤'}</div><div><b>${esc(u.name)} · ${esc(u.role)}</b><small>${esc(u.mobile)} · ${esc(u.area||'Kalna')}</small></div></div></div>`).join('')||'<div class="alert">No user added yet</div>'}</section>`) }
async function addPage(){layout(`<section class="card"><h2>Add Passenger / Driver</h2><p class="muted">আপনার area-তে user add হবে। Driver add করলে approval status pending থাকবে।</p><div class="formGrid"><input id="nm" placeholder="Name"><input id="mob" placeholder="Mobile"><input id="em" placeholder="Email optional"><input id="area" placeholder="Area" value="${esc(me?.user?.area||'Kalna')}"><input id="veh" placeholder="Toto Number (Driver only)"><input id="aad" placeholder="Aadhaar (Driver only)"><input id="lic" placeholder="Driving Licence (Driver only)"><input id="pass" placeholder="Temporary password" value="123456"></div><div class="btns" style="margin-top:12px"><button onclick="createUser('PASSENGER')">Add Passenger</button><button onclick="createUser('DRIVER')">Add Driver</button></div><div id="msg"></div></section>`)}
async function createUser(role){try{const body={role,name:$('#nm').value,mobile:$('#mob').value,email:$('#em').value,area:$('#area').value,vehicle_no:$('#veh').value,aadhaar_no:$('#aad').value,license_no:$('#lic').value,password:$('#pass').value||'123456'};const d=await api('/subadmin/users',{method:'POST',body});$('#msg').innerHTML=`<div class="ok">${role} added successfully: ${esc(d.user.name)} (${esc(d.user.mobile)})</div>`}catch(e){$('#msg').innerHTML=`<div class="alert">${esc(e.message)}</div>`}}
async function driversPage(){const d=await api('/admin/drivers');layout(`<section class="card"><h2>My Area Drivers</h2><p class="muted">নিজের এলাকার pending driver approve/reject করতে পারবেন।</p>${(d.drivers||[]).map(x=>`<div class="row"><div class="left"><div class="ico">🛺</div><div><b>${esc(x.name||'Driver')} · ${esc(x.vehicle_no||'No Toto No')}</b><small>${esc(x.mobile||'')} · ${esc(x.area||x.location||'Kalna')} · ${esc(x.status)} · ${x.online?'Online':'Offline'} · ${x.rating||5}⭐</small></div></div><div class="btns">${x.status==='APPROVED'?`<button class="secondary" onclick="driverAct('${x.id}','offline')">Offline</button>`:`<button onclick="driverAct('${x.id}','approve')">Approve</button><button class="bad" onclick="driverAct('${x.id}','reject')">Reject</button>`}</div></div>`).join('')||'<div class="alert">No driver yet</div>'}</section>`)}
async function driverAct(id,act){try{await api(`/admin/drivers/${id}/${act}`,{method:'POST',body:{}});driversPage()}catch(e){alert(e.message)}}
async function earningsPage(){let cms={summary:{},rows:[],commissions:[],settlements:[],payout_requests:[]};let reqs={requests:[]};try{cms=await api('/admin/subadmin-commissions')}catch(e){}try{reqs=await api('/subadmin/payout-requests')}catch(e){}const open=(reqs.requests||[]).find(x=>x.status==='REQUESTED');layout(`<section class="card"><h2>My Commission</h2><p class="muted">Sub Admin share platform commission থেকে হিসাব হবে, total fare থেকে নয়।</p><div class="grid"><div class="stat"><b>₹${cms.summary.pending_amount||0}</b><span>Pending</span></div><div class="stat"><b>₹${cms.summary.paid_amount||0}</b><span>Paid</span></div><div class="stat"><b>${cms.summary.pending_count||0}</b><span>Pending Entries</span></div><div class="stat"><b>${(reqs.requests||[]).filter(x=>x.status==='REQUESTED').length}</b><span>Payout Request</span></div></div><div class="btns" style="margin-top:14px"><button ${open?'disabled':''} onclick="requestPayout()">${open?'Payout Request Pending':'Request Payout'}</button></div></section><section class="card"><h2>Payout Requests</h2>${(reqs.requests||[]).slice(0,10).map(x=>`<div class="row"><div class="left"><div class="ico">🧾</div><div><b>₹${x.amount} · ${esc(x.status)}</b><small>${String(x.requested_at||'').slice(0,19)} · ${esc(x.payment_ref||'')}</small></div></div></div>`).join('')||'<div class="alert">No payout request yet</div>'}</section><section class="card"><h2>Commission Entries</h2>${(cms.commissions||[]).slice(0,20).map(c=>`<div class="row"><div class="left"><div class="ico">💰</div><div><b>₹${c.amount} · ${esc(c.status)}</b><small>Platform ₹${c.platform_commission||0} · Share ${c.share_percent||0}% · Ride ${esc(c.ride_id||'')}</small></div></div></div>`).join('')||'<div class="ok">No commission yet</div>'}</section><section class="card"><h2>Payout History</h2>${(cms.settlements||[]).slice(0,10).map(s=>`<div class="row"><div class="left"><div class="ico">✅</div><div><b>Paid ₹${s.amount}</b><small>${esc(s.payment_ref||'Manual')} · ${String(s.paid_at||'').slice(0,19)}</small></div></div></div>`).join('')||'<div class="alert">No payout yet</div>'}</section>`) }
async function requestPayout(){try{const note=prompt('Payout request note','Please release my pending commission')||'Please release my pending commission';await api('/subadmin/payout-request',{method:'POST',body:{note}});earningsPage()}catch(e){alert(e.message)}}
async function livePage(){const d=await api('/live/locations');layout(`<section class="card"><h2>Area Live Monitor</h2><p class="muted">আপনার area-র online driver ও active ride দেখুন।</p><div class="grid"><div class="stat"><b>${(d.drivers||[]).filter(x=>x.online).length}</b><span>Online Drivers</span></div><div class="stat"><b>${(d.rides||[]).length}</b><span>Active Rides</span></div><div class="stat"><b>${(d.drivers||[]).length}</b><span>Total Locations</span></div><div class="stat"><b>${esc(d.service_area||'Kalna')}</b><span>Service Area</span></div></div></section><section class="card"><h2>Driver Locations</h2>${(d.drivers||[]).map(x=>`<div class="row"><div class="left"><div class="ico">📡</div><div><b>${esc(x.name)} · ${esc(x.vehicle_no||'Toto')}</b><small>${x.online?'Online':'Offline'} · ${Number(x.lat||0).toFixed(5)}, ${Number(x.lng||0).toFixed(5)} · ${esc(x.location||'Kalna')}</small></div></div><b>${esc(x.status)}</b></div>`).join('')||'<div class="alert">No live driver</div>'}</section><section class="card"><h2>Active Rides</h2>${(d.rides||[]).map(r=>`<div class="row"><div class="left"><div class="ico">🛺</div><div><b>${esc(r.pickup)} → ${esc(r.drop)}</b><small>${esc(r.status)} · Passenger ${esc(r.passenger_name||'')} · Driver ${esc(r.driver_name||'Waiting')}</small></div></div><b>₹${r.estimated_fare||0}</b></div>`).join('')||'<div class="ok">No active ride now</div>'}</section>`)}
render();
</script>
</body>
</html>
