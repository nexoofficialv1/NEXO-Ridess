name: Build NEXO Ride APK 8A RC3

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build APK Sprint-8A RC3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sprint-8A deploy/APK QA precheck
        run: npm run s8a:check

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Verify Android project
        working-directory: apk
        run: |
          java -version
          gradle --version
          grep -n "versionCode\|versionName\|compileSdk\|targetSdk" app/build.gradle

      - name: Build Debug APK
        if: inputs.build_type == 'debug'
        working-directory: apk
        run: gradle :app:assembleDebug --stacktrace

      - name: Build Release APK
        if: inputs.build_type == 'release'
        working-directory: apk
        run: gradle :app:assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEXO_Ride_APK_v2_0_8A_RC3_${{ inputs.build_type }}
          path: |
            apk/app/build/outputs/apk/debug/*.apk
            apk/app/build/outputs/apk/release/*.apk
          retention-days: 30
