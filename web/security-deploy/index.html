<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride · Security Deploy</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#07111f;color:#eef6ff}.wrap{max-width:1100px;margin:auto;padding:22px}.hero{background:linear-gradient(135deg,#0f2350,#102b22);border:1px solid #29476d;border-radius:22px;padding:22px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:#0e1b32;border:1px solid #273b62;border-radius:18px;padding:16px}.ok{color:#52ffa8}.bad{color:#ff7d7d}.warn{color:#ffd76a}.muted{color:#a9bad8}.btn{display:inline-block;padding:11px 14px;margin:4px;border-radius:12px;background:#22d3ee;color:#06111f;text-decoration:none;font-weight:800}code{background:#020817;padding:3px 6px;border-radius:8px}button{padding:10px 12px;border:0;border-radius:12px;background:#22d3ee;font-weight:800}input,textarea,select{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #334b73;background:#081629;color:#fff;padding:10px;margin:4px 0}</style></head><body><div class="wrap"><div class="hero"><h1>Final Security + Deploy Lock</h1><p class="muted">Production deploy করার আগে security, config, role, maintenance, audit এবং rollback gate এক জায়গায়।</p><a class="btn" href="/rollback/">Rollback Pack</a><a class="btn" href="/maintenance/">Maintenance Mode</a><a class="btn" href="/api/platform/launch-release-lock">Release Lock JSON</a></div><div id="app" class="grid"></div></div><script>
async function load(){const [r,l,a]=await Promise.all([fetch('/api/platform/security-deploy-readiness').then(x=>x.json()),fetch('/api/platform/launch-release-lock').then(x=>x.json()),fetch('/api/platform/final-audit-checklist').then(x=>x.json())]);
const cards=[['Security Score',r.score_percent+'%',r.ok],['Launch Status',l.status,l.ok],['Audit Tests',a.items.filter(i=>i.ok).length+'/'+a.items.length,a.ok],['Maintenance',r.maintenance.active?'ACTIVE':'OFF',!r.maintenance.active]];
document.getElementById('app').innerHTML=cards.map(c=>`<div class="card"><h2 class="${true:'ok',false:'bad'}[c[2]]">${c[0]}</h2><p>${c[1]}</p></div>`).join('')+'<div class="card"><h3>Blockers</h3>'+((l.blockers||[]).map(b=>`<p class="bad"><b>${b.source}</b> · ${b.title||b.key}<br><span class="muted">${b.detail||''}</span></p>`).join('')||'<p class="ok">No launch blockers.</p>')+'</div><div class="card"><h3>Deploy Rule</h3><p>Latest ZIP only. Live <code>.env</code> এবং <code>data/</code> overwrite করবেন না।</p></div>'}
load();</script></body></html>
