<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride Release Notes</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#eef4ff;color:#10203f}.wrap{max-width:1100px;margin:auto;padding:24px}.hero{background:linear-gradient(135deg,#091b3a,#123f7a);color:white;border-radius:24px;padding:24px;box-shadow:0 14px 30px #0b1c3a22}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:18px}.card{background:white;border-radius:18px;padding:18px;box-shadow:0 8px 20px #1c3d7014}.badge{display:inline-block;padding:6px 10px;border-radius:99px;background:#e7f1ff;color:#063a77;font-weight:700;font-size:12px}.ok{color:#0a7b38}.bad{color:#b00020}.btn{display:inline-block;background:#0b5bd3;color:white;padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:800;margin:4px 6px 4px 0}.btn2{display:inline-block;background:white;color:#0b5bd3;border:1px solid #0b5bd3;padding:11px 15px;border-radius:12px;text-decoration:none;font-weight:800;margin:4px 6px 4px 0}pre{white-space:pre-wrap;background:#071733;color:#e8f1ff;border-radius:14px;padding:14px;overflow:auto}li{margin:7px 0}.small{font-size:13px;color:#5c6b82}</style></head><body><div class="wrap"><div class="hero"><span class="badge">Release Notes</span><h1>NEXO Ride Sprint-7X</h1><p>Passenger, Driver, Admin update notes এবং known limitations.</p><a class="btn" href="/apk-release/">APK Release</a><a class="btn2" href="/version-history/">Version History</a></div><div id="notes" class="grid"></div><div class="card"><h3>Raw API</h3><pre id="raw">Loading...</pre></div></div><script>function list(a){return '<ul>'+a.map(x=>'<li>'+x+'</li>').join('')+'</ul>'}fetch('/api/public/release-notes').then(r=>r.json()).then(j=>{raw.textContent=JSON.stringify(j,null,2);let n=j.release_notes||{};notes.innerHTML=`<div class="card"><h3>Summary</h3><p>${n.summary_bn||''}</p><p class="small">${n.deploy_warning_bn||''}</p></div><div class="card"><h3>Passenger</h3>${list(n.passenger_bn||[])}</div><div class="card"><h3>Driver</h3>${list(n.driver_bn||[])}</div><div class="card"><h3>Admin</h3>${list(n.admin_bn||[])}</div><div class="card"><h3>Known limitations</h3>${list(n.known_limitations_bn||[])}</div>`}).catch(e=>raw.textContent=e.message)</script></body></html>
