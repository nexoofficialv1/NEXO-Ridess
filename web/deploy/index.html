<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride Deploy Readiness</title><style>body{margin:0;font-family:system-ui,Noto Sans Bengali,sans-serif;background:#071225;color:#eef7ff}header{padding:20px;background:#0d1f43}main{max-width:1100px;margin:auto;padding:16px}.card{background:#102755;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;margin:12px 0}.ok{color:#4ade80}.bad{color:#fb7185}.warn{color:#facc15}button{border:0;border-radius:12px;padding:10px 14px;font-weight:900;background:#7df9ff;color:#03111e}td,th{border-bottom:1px solid rgba(255,255,255,.12);padding:9px;text-align:left}table{width:100%;border-collapse:collapse}pre{white-space:pre-wrap;background:#020817;border-radius:12px;padding:12px;overflow:auto}</style></head><body><header><h2>NEXO Ride · Sprint-7I Deploy Readiness</h2><div>Production deploy safety, notification, load-test readiness</div></header><main><button onclick="load()">Refresh</button> <button onclick="backup()">Admin Backup Now</button><div id="out"></div></main><script>
const token=localStorage.getItem('nexo_token')||localStorage.getItem('token')||'';
function row(c){return `<tr><td><b class="${c.ok?'ok':'bad'}">${c.ok?'OK':'PENDING'}</b></td><td>${c.title||c.key}</td><td>${c.detail||''}</td></tr>`}
async function load(){const prod=await (await fetch('/api/platform/production-readiness')).json();const notif=await (await fetch('/api/platform/notification-readiness')).json();const loadt=await (await fetch('/api/platform/loadtest-readiness')).json();document.getElementById('out').innerHTML=`<div class="card"><h3>Production Score: ${prod.score_percent}%</h3><table>${prod.checks.map(row).join('')}</table></div><div class="card"><h3>Notification</h3><table>${notif.checks.map(row).join('')}</table></div><div class="card"><h3>Load Test Estimate</h3><pre>${JSON.stringify(loadt,null,2)}</pre></div>`}
async function backup(){if(!token){alert('Admin login token not found in browser');return}const r=await fetch('/api/admin/backup-now',{method:'POST',headers:{Authorization:'Bearer '+token}});alert(JSON.stringify(await r.json(),null,2));load()}
load();
</script></body></html>
