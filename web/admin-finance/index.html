<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Finance Center</title><style>
body{margin:0;font-family:system-ui;background:#071025;color:#eef6ff}.wrap{max-width:1200px;margin:auto;padding:18px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.card{background:#0e1b3d;border:1px solid #21376c;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 8px 28px #0005}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.kpi{background:#13275a;border-radius:14px;padding:14px}.kpi b{font-size:24px;color:#7df9ff}input,select,button,textarea{border:0;border-radius:12px;padding:12px;margin:5px;background:#eaf1ff;color:#071025}button{background:#33e1ff;font-weight:800;cursor:pointer}.danger{background:#ff5875;color:white}.muted{color:#adc2ff}.row{display:flex;gap:8px;flex-wrap:wrap}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #27406f;padding:8px;text-align:left;font-size:13px}a{color:#7df9ff}.pill{border:1px solid #37599b;border-radius:999px;padding:5px 10px;color:#bfe8ff}</style></head><body><div class="wrap">
<div class="top"><div><h2>💰 NEXO Ride Finance Center</h2><p class="muted">Fare Engine · Commission · Driver Wallet · Settlement · Receipt</p></div><div class="row"><a href="/app/admin.html">Main Admin</a><a href="/admin-ops/">Ops</a><a href="/data-health/">Data Health</a></div></div>
<div class="card"><h3>Admin Login Token</h3><input id="token" placeholder="Paste admin token"><button onclick="saveToken()">Save</button><button onclick="loadAll()">Refresh</button><span id="msg" class="muted"></span></div>
<div id="kpis" class="grid"></div>
<div class="card"><h3>Fare Engine</h3><div class="row"><input id="full_base_fare" placeholder="Full base fare"><input id="minimum_full" placeholder="Minimum full"><input id="sharing_base_per_seat" placeholder="Sharing per seat"><input id="extra_step_fare" placeholder="Extra step fare"><input id="waiting_charge_per_minute" placeholder="Waiting/min"><input id="peak_hour_multiplier" placeholder="Peak multiplier"><button onclick="saveFare()">Save Fare</button></div><pre id="fare" class="muted"></pre></div>
<div class="card"><h3>Commission Rule</h3><div class="row"><select id="commission_mode"><option>PERCENT</option><option>FIXED</option><option>HYBRID_MAX</option><option>HYBRID_MIN</option></select><input id="commission_percent" placeholder="Percent e.g. 10"><input id="fixed_amount" placeholder="Fixed ₹"><button onclick="saveCommission()">Save Global Commission</button></div><pre id="commission" class="muted"></pre></div>
<div class="card"><h3>Driver Wallets & Settlement</h3><div class="row"><input id="driver_id" placeholder="driver_id for payout"><input id="payment_ref" placeholder="UPI/Bank reference"><button onclick="settleDriver()">Mark Settlement Paid</button></div><div id="wallets"></div></div>
<div class="card"><h3>Recent Ledger / Receipts</h3><div id="ledger"></div></div>
</div><script>
let TOKEN=localStorage.getItem('nexo_admin_token')||''; token.value=TOKEN; function saveToken(){TOKEN=token.value.trim();localStorage.setItem('nexo_admin_token',TOKEN);msg.textContent='saved'}
async function api(path,opt={}){opt.headers={...(opt.headers||{}),'Content-Type':'application/json','Authorization':'Bearer '+TOKEN};let r=await fetch(path,opt);let j=await r.json().catch(()=>({detail:'Invalid JSON'}));if(!r.ok)throw new Error(j.detail||r.status);return j}
function money(v){return '₹'+Number(v||0).toFixed(2)}
function table(rows,cols){return '<table><tr>'+cols.map(c=>'<th>'+c[0]+'</th>').join('')+'</tr>'+rows.map(r=>'<tr>'+cols.map(c=>'<td>'+String(r[c[1]]??'')+'</td>').join('')+'</tr>').join('')+'</table>'}
async function loadAll(){try{let d=await api('/api/admin/finance-dashboard'); let s=d.summary||{}; kpis.innerHTML=[['Completed',s.completed_rides],['Fare',money(s.total_fare)],['Commission',money(s.platform_commission)],['Driver Earning',money(s.driver_earning)],['Pending Settlement',money(s.settlement_pending)],['Paid',money(s.settlement_paid)]].map(x=>`<div class="kpi"><span>${x[0]}</span><br><b>${x[1]}</b></div>`).join(''); fare.textContent=JSON.stringify(d.fare_rules,null,2); commission.textContent=JSON.stringify(d.commission_rules,null,2); wallets.innerHTML=table((d.drivers||[]).slice(0,50),[['Driver','driver_name'],['Mobile','mobile'],['Vehicle','vehicle_no'],['Rides','rides'],['Fare','fare'],['Earning','earning'],['Pending','pending']]); ledger.innerHTML=table((d.ledger||[]).slice(0,50),[['At','at'],['Driver','driver_id'],['Type','type'],['Amount','amount'],['Ride','ride_id'],['Settlement','settlement_id']]); msg.textContent='Loaded'}catch(e){msg.textContent=e.message}}
async function saveFare(){let body={};['full_base_fare','minimum_full','sharing_base_per_seat','extra_step_fare','waiting_charge_per_minute','peak_hour_multiplier'].forEach(id=>{if(document.getElementById(id).value)body[id]=Number(document.getElementById(id).value)});try{await api('/api/admin/fare-engine',{method:'POST',body:JSON.stringify(body)});loadAll()}catch(e){alert(e.message)}}
async function saveCommission(){let body={scope:'GLOBAL',mode:commission_mode.value,percent:Number(commission_percent.value||0),fixed_amount:Number(fixed_amount.value||0)};try{await api('/api/admin/commission-rules',{method:'POST',body:JSON.stringify(body)});loadAll()}catch(e){alert(e.message)}}
async function settleDriver(){try{let j=await api('/api/admin/settlements/create',{method:'POST',body:JSON.stringify({driver_id:driver_id.value.trim(),payment_ref:payment_ref.value.trim()})});alert('Paid: '+j.settlement.amount);loadAll()}catch(e){alert(e.message)}}
loadAll();
</script></body></html>
