<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride · Maintenance</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#07111f;color:#eef6ff}.wrap{max-width:1100px;margin:auto;padding:22px}.hero{background:linear-gradient(135deg,#0f2350,#102b22);border:1px solid #29476d;border-radius:22px;padding:22px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.card{background:#0e1b32;border:1px solid #273b62;border-radius:18px;padding:16px}.ok{color:#52ffa8}.bad{color:#ff7d7d}.warn{color:#ffd76a}.muted{color:#a9bad8}.btn{display:inline-block;padding:11px 14px;margin:4px;border-radius:12px;background:#22d3ee;color:#06111f;text-decoration:none;font-weight:800}code{background:#020817;padding:3px 6px;border-radius:8px}button{padding:10px 12px;border:0;border-radius:12px;background:#22d3ee;font-weight:800}input,textarea,select{width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #334b73;background:#081629;color:#fff;padding:10px;margin:4px 0}</style></head><body><div class="wrap"><div class="hero"><h1>Maintenance Mode</h1><p class="muted">Main Admin emergency সময় public booking, QR booking, dispatch বা payment pause করতে পারবে।</p><a class="btn" href="/api/public/maintenance-status">Public Status</a><a class="btn" href="/security-deploy/">Security Deploy</a></div><div id="status" class="grid"></div><div class="card"><h3>API</h3><p>Main Admin token দিয়ে POST <code>/api/admin/maintenance-mode</code></p><pre>{"public_booking_paused":true,"payment_paused":true,"note":"Emergency maintenance"}</pre></div></div><script>
async function load(){const s=await fetch('/api/public/maintenance-status').then(r=>r.json()); const m=s.settings||{}; const items=[['Maintenance',m.maintenance_enabled],['Public Booking Paused',m.public_booking_paused],['QR Booking Paused',m.qr_booking_paused],['Driver Dispatch Paused',m.driver_dispatch_paused],['Payment Paused',m.payment_paused],['Admin Only Mode',m.admin_only_mode]]; document.getElementById('status').innerHTML=items.map(x=>`<div class="card"><h3>${x[0]}</h3><p class="${x[1]?'warn':'ok'}">${x[1]?'ON':'OFF'}</p></div>`).join('')+`<div class="card"><h3>Message</h3><p>${m.message_bn||''}</p><p class="muted">${m.message_en||''}</p></div>`}
load();</script></body></html>
