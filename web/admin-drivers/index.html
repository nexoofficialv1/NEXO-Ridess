<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Driver KYC</title><style>body{margin:0;font-family:system-ui;background:#071124;color:#fff}header{padding:18px 22px;background:#0e1b3f;position:sticky;top:0}main{padding:18px;max-width:1180px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.card{background:#101b3d;border:1px solid #263b78;border-radius:16px;padding:14px;margin:10px 0}input,select,textarea,button{width:100%;box-sizing:border-box;margin:6px 0;padding:11px;border-radius:10px;border:1px solid #2f4484;background:#09142d;color:#fff}button{background:#17b7ff;color:#041023;font-weight:800;cursor:pointer}.muted{color:#aab8e8}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#20396d;margin:2px}.bad{background:#5b1b2b}.good{background:#124d37}.row{display:flex;gap:8px;flex-wrap:wrap}.row>*{flex:1;min-width:160px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #263b78;padding:8px;text-align:left}a{color:#7df9ff}</style></head><body><header><h2>🚖 Driver Onboarding / KYC · Sprint-7N</h2><div class="muted">১০,০০০ driver-ready pagination/search/filter. Token admin login থেকে paste করুন।</div></header><main><div class=card><input id=token placeholder="Admin token"><button onclick="saveToken()">Save Token</button></div><div class=grid id=summary></div><div class=card><h3>নতুন Driver Register</h3><div class=row><input id=name placeholder="Driver name"><input id=mobile placeholder="Mobile"><input id=vehicle placeholder="Toto/Vehicle no"></div><div class=row><select id=area></select><select id=stand></select><input id=addr placeholder="Address"></div><button onclick="registerDriver()">Register Driver</button></div><div class=card><h3>Driver Search</h3><div class=row><input id=q placeholder="name/mobile/vehicle"><select id=status><option value="">All Status</option><option>APPROVED</option><option>PENDING</option><option>REJECTED</option><option>SUSPENDED</option></select><button onclick="loadDrivers(1)">Search</button></div><div id=drivers></div></div></main><script>
const API=''; let page=1; token.value=localStorage.nexo_admin_token||''; function saveToken(){localStorage.nexo_admin_token=token.value.trim();loadAll();} function hdr(){return {'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.nexo_admin_token||token.value.trim())}}
async function j(url,opt={}){const r=await fetch(url,{...opt,headers:{...hdr(),...(opt.headers||{})}});const x=await r.json().catch(()=>({detail:'Bad JSON'})); if(!r.ok) throw new Error(x.detail||r.status); return x;}
async function loadAll(){await loadAreas(); await loadDrivers(1);}
async function loadAreas(){try{let a=await j('/api/admin/areas'); area.innerHTML=a.areas.map(x=>`<option value="${x.id}">${x.name}</option>`).join(''); await loadStands();}catch(e){summary.innerHTML='<div class=card>'+e.message+'</div>';}}
area.onchange=loadStands; async function loadStands(){let a=area.value; let s=await j('/api/admin/stands?area_id='+encodeURIComponent(a)); stand.innerHTML=s.stands.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');}
async function registerDriver(){try{let x=await j('/api/admin/drivers/register',{method:'POST',body:JSON.stringify({name:name.value,mobile:mobile.value,vehicle_no:vehicle.value,area_id:area.value,stand_id:stand.value,address:addr.value})}); alert('Registered '+x.driver.driver_code); loadDrivers(1);}catch(e){alert(e.message)}}
async function stage(id,st){try{await j('/api/admin/drivers/'+id+'/approval-stage',{method:'POST',body:JSON.stringify({stage:st,note:'Portal update'})});loadDrivers(page);}catch(e){alert(e.message)}}
async function loadDrivers(p){page=p||1;try{let x=await j(`/api/admin/drivers?page=${page}&limit=50&q=${encodeURIComponent(q.value)}&status=${encodeURIComponent(status.value)}`); summary.innerHTML=Object.entries(x.summary).filter(([k,v])=>typeof v!=='object').map(([k,v])=>`<div class=card><b>${k}</b><h2>${v}</h2></div>`).join(''); drivers.innerHTML=`<div class=muted>Total ${x.total} · Page ${x.page}/${x.total_pages}</div><table><tr><th>Driver</th><th>Area/Stand</th><th>Status</th><th>KYC</th><th>Action</th></tr>${x.drivers.map(d=>`<tr><td><b>${d.name}</b><br>${d.mobile}<br>${d.vehicle_no||''}</td><td>${d.area_name||''}<br>${d.stand_name||''}</td><td><span class="pill">${d.status}</span><br>${d.approval_stage}</td><td>${d.docs_present}/${d.docs_required}<br>${d.docs_missing.join(', ')}</td><td><button onclick="stage('${d.id}','SUB_ADMIN_VERIFIED')">Sub Verify</button><button onclick="stage('${d.id}','AREA_ADMIN_APPROVED')">Area Approve</button><button onclick="stage('${d.id}','MAIN_ADMIN_ACTIVE')">Activate</button><button onclick="stage('${d.id}','BLOCKED')">Block</button></td></tr>`).join('')}</table>`;}catch(e){drivers.innerHTML='<div class=card>'+e.message+'</div>';}}
if(token.value) loadAll();
</script></body></html>
