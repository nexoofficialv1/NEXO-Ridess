<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Areas</title><style>body{margin:0;font-family:system-ui;background:#071124;color:#fff}header{padding:18px 22px;background:#0e1b3f;position:sticky;top:0}main{padding:18px;max-width:1180px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.card{background:#101b3d;border:1px solid #263b78;border-radius:16px;padding:14px;margin:10px 0}input,select,textarea,button{width:100%;box-sizing:border-box;margin:6px 0;padding:11px;border-radius:10px;border:1px solid #2f4484;background:#09142d;color:#fff}button{background:#17b7ff;color:#041023;font-weight:800;cursor:pointer}.muted{color:#aab8e8}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#20396d;margin:2px}.bad{background:#5b1b2b}.good{background:#124d37}.row{display:flex;gap:8px;flex-wrap:wrap}.row>*{flex:1;min-width:160px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #263b78;padding:8px;text-align:left}a{color:#7df9ff}</style></head><body><header><h2>📍 Area / Stand Management · Sprint-7N</h2></header><main><div class=card><input id=token placeholder="Admin token"><button onclick="saveToken()">Save Token</button></div><div class=grid><div class=card><h3>Area Create/Update</h3><input id=areaName placeholder="Area name"><button onclick="saveArea()">Save Area</button></div><div class=card><h3>Stand Create/Update</h3><select id=areaSel></select><input id=standName placeholder="Stand name"><button onclick="saveStand()">Save Stand</button></div></div><div class=card><h3>Areas</h3><div id=areas></div></div><div class=card><h3>Stands</h3><div id=stands></div></div></main><script>
token.value=localStorage.nexo_admin_token||'';function saveToken(){localStorage.nexo_admin_token=token.value.trim();loadAll();}function hdr(){return {'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.nexo_admin_token||token.value.trim())}}async function j(u,o={}){const r=await fetch(u,{...o,headers:{...hdr(),...(o.headers||{})}});const x=await r.json().catch(()=>({detail:'Bad JSON'}));if(!r.ok)throw new Error(x.detail||r.status);return x;}
async function saveArea(){try{await j('/api/admin/areas',{method:'POST',body:JSON.stringify({name:areaName.value})});areaName.value='';loadAll();}catch(e){alert(e.message)}}
async function saveStand(){try{await j('/api/admin/stands',{method:'POST',body:JSON.stringify({area_id:areaSel.value,name:standName.value})});standName.value='';loadAll();}catch(e){alert(e.message)}}
async function loadAll(){try{let a=await j('/api/admin/areas'); areaSel.innerHTML=a.areas.map(x=>`<option value="${x.id}">${x.name}</option>`).join(''); areas.innerHTML='<table><tr><th>Area</th><th>Drivers</th><th>Stands</th><th>Status</th></tr>'+a.areas.map(x=>`<tr><td>${x.name}</td><td>${x.drivers} / approved ${x.approved_drivers}</td><td>${x.stands}</td><td>${x.status}</td></tr>`).join('')+'</table>'; let s=await j('/api/admin/stands'); stands.innerHTML='<table><tr><th>Stand</th><th>Area</th><th>Drivers</th><th>Status</th></tr>'+s.stands.map(x=>`<tr><td>${x.name}</td><td>${x.area_name}</td><td>${x.drivers}</td><td>${x.status}</td></tr>`).join('')+'</table>';}catch(e){areas.innerHTML='<div class=card>'+e.message+'</div>';}}
if(token.value) loadAll();
</script></body></html>
