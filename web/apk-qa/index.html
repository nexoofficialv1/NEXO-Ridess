<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sprint-8A APK Build QA</title><style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#071022;color:#edf6ff}header{padding:24px;background:linear-gradient(135deg,#0b1b3f,#123c69)}main{padding:20px;max-width:1100px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.card{background:#101d36;border:1px solid #29466f;border-radius:16px;padding:16px;box-shadow:0 10px 24px #0005}.ok{color:#00e59b;font-weight:800}.bad{color:#ff6b6b;font-weight:800}.muted{color:#aac0db}button,a.btn{display:inline-block;background:#19d3ff;color:#00101b;border:0;border-radius:12px;padding:11px 14px;font-weight:800;text-decoration:none;margin:4px 6px 4px 0}pre{white-space:pre-wrap;background:#06101f;border-radius:12px;padding:12px;overflow:auto}li{margin:8px 0}</style></head><body><header><h1>Sprint-8A APK Build QA</h1><p>GitHub Actions APK build, artifact, distribution এবং real phone QA readiness।</p><a class="btn" href="/">Home</a><a class="btn" href="/api/platform/apk-qa-readiness">API</a></header><main><div id="status" class="card">Loading...</div><div id="cards" class="grid"></div><h3>Raw Report</h3><pre id="raw"></pre></main><script>function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}async function load(){try{const r=await fetch('/api/platform/apk-qa-readiness'); const j=await r.json(); document.getElementById('raw').textContent=JSON.stringify(j,null,2); document.getElementById('status').innerHTML='<h2 class="'+(j.ok?'ok':'bad')+'">'+(j.status||j.release_candidate||j.version||'Status')+'</h2><p class="muted">Sprint '+esc(j.sprint||'8A')+' · '+new Date().toLocaleString()+'</p>'; const checks=j.checks||j.deploy_dry_run?.checks||j.apk_qa?.checks||j.real_device_qa?.checklist||j.pilot_preflight?.checks||[]; document.getElementById('cards').innerHTML=checks.map(c=>'<div class="card"><b class="'+(c.ok||c.status==='PASS'?'ok':'bad')+'">'+esc(c.key||c.title)+'</b><h3>'+esc(c.title||c.status||'Check')+'</h3><p class="muted">'+esc(c.detail||c.note||c.role||'')+'</p></div>').join('');}catch(e){document.getElementById('status').innerHTML='<b class=bad>Load failed</b> '+esc(e.message);}}load();</script></body></html>
