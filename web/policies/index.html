<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NEXO Ride Policies</title><style>body{margin:0;font-family:system-ui,Noto Sans Bengali,sans-serif;background:#f5f8ff;color:#101828}.wrap{max-width:980px;margin:auto;padding:18px}.hero{background:linear-gradient(135deg,#0b74de,#07539e);color:#fff;border-radius:22px;padding:18px}.card{background:#fff;border:1px solid #d9e7f5;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 10px 25px #10182812}.muted{color:#667085}.pill{background:#eaf5ff;color:#07539e;border-radius:999px;padding:4px 8px;font-weight:800;font-size:12px}a{color:#0b74de;font-weight:800}</style></head><body><div class="wrap"><div class="hero"><h1>NEXO Ride Policy Center</h1><p>Terms · Privacy · Refund · Cancellation · Driver · Safety · Data Deletion</p></div><div id="list"></div><div id="detail"></div></div><script>const esc=x=>String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function load(){const d=await fetch('/api/policies').then(r=>r.json());list.innerHTML=Object.entries(d.policies||{}).map(([k,p])=>`<div class="card"><h2>${esc(p.title)}</h2><span class="pill">${esc(p.status)}</span> <span class="pill">${esc(p.version)}</span><p class="muted">Updated: ${esc(p.updated_at)}</p><a href="#${k}" onclick="openPolicy('${k}')">Open</a></div>`).join('')}async function openPolicy(k){const d=await fetch('/api/policies/'+encodeURIComponent(k)).then(r=>r.json());if(!d.ok){detail.innerHTML='<div class="card">Not found</div>';return}const p=d.policy;detail.innerHTML=`<div class="card"><h1>${esc(p.title)}</h1><p><span class="pill">${esc(p.status)}</span> <span class="pill">${esc(p.version)}</span></p><p class="muted">Last updated: ${esc(p.updated_at)}</p><div style="white-space:pre-wrap;line-height:1.65">${esc(p.body)}</div><p class="muted">Note: Draft policy text should be legally vetted before public launch.</p></div>`;detail.scrollIntoView({behavior:'smooth'})}load();if(location.hash)setTimeout(()=>openPolicy(location.hash.slice(1)),300)</script></body></html>
